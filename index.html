<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Music Hub V23.9 (App Link Integration)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        html, body { font-family: 'Pretendard Variable', sans-serif; background-color: #050505; color: #fff; margin: 0; padding: 0; width: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .text-gradient { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-btn { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0a0a0a; } ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .role-badge { display: inline-block; background: #18181b; color: #10b981; border: 1px solid #27272a; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: bold; margin-right: 6px; pointer-events: none; }
        #main-scroll-area { height: 100vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .studio-view-enter { transform: translateY(0); opacity: 1; pointer-events: auto; visibility: visible; }
        .studio-view-exit { transform: translateY(100%); opacity: 0; pointer-events: none; visibility: hidden; }
        #studio-view { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .card-fav-active { color: #10b981 !important; fill: #10b981 !important; }
        .aura-chill { background: linear-gradient(to right, #0f172a, #1e1b4b, #000000) !important; } .aura-groove { background: linear-gradient(to right, #064e3b, #065f46, #000000) !important; } .aura-hype { background: linear-gradient(to right, #7f1d1d, #991b1b, #000000) !important; }
        
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUpFade { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -20px); opacity: 0; } }
        .toast-animate { animation: slideUpFade 3s ease-in-out forwards; }
    </style>
</head>
<body class="relative">

    <div id="toast-container" class="fixed bottom-[110px] left-1/2 z-[300] flex flex-col gap-2 pointer-events-none w-full max-w-xs md:max-w-md"></div>

    <div id="folder-modal" class="fixed inset-0 z-[250] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-700 w-full max-w-sm shadow-2xl modal-enter">
            <h3 class="text-xl font-bold text-white mb-2">보관함 저장</h3>
            <p class="text-zinc-400 text-xs mb-5">어떤 폴더에 저장할까요?</p>
            <div id="folder-list" class="space-y-2 mb-5 max-h-40 overflow-y-auto scrollbar-thin border-b border-zinc-800 pb-4"></div>
            <input type="text" id="new-folder-input" placeholder="또는 새 폴더 이름 입력..." class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#10b981] text-white px-4 py-3 rounded-xl text-sm mb-5 outline-none transition-colors">
            <div class="flex gap-3">
                <button onclick="closeFolderModal()" class="flex-1 py-3 bg-zinc-800 text-white font-bold rounded-xl hover:bg-zinc-700">취소</button>
                <button onclick="saveToFolder()" class="flex-1 py-3 bg-[#10b981] text-black font-extrabold rounded-xl hover:scale-105 transition-transform">저장하기</button>
            </div>
        </div>
    </div>

    <div class="absolute top-4 right-4 md:top-6 md:right-8 z-50">
        <button id="login-btn" onclick="signInWithGoogle()" class="bg-white text-black px-4 py-1.5 md:px-5 md:py-2 rounded-full font-bold text-xs md:text-sm shadow-xl hidden">구글 로그인</button>
        <div id="user-profile" class="flex items-center gap-2 md:gap-3 bg-zinc-900/80 backdrop-blur-md border border-zinc-800 px-2 py-1 md:px-3 md:py-1.5 rounded-full hidden">
            <img id="user-photo" src="" onerror="this.src='https://placehold.co/100x100/18181b/10b981?text=U'" class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-zinc-700">
            <span id="user-name" class="text-[10px] md:text-xs font-bold text-white max-w-[80px] md:max-w-[100px] truncate">사용자</span>
            <button onclick="signOut()" class="text-[10px] text-zinc-500 hover:text-white px-2 py-1 border-l border-zinc-700">로그아웃</button>
        </div>
    </div>

<div id="main-scroll-area">
    <div class="max-w-7xl mx-auto pt-16 md:pt-20 px-4 md:px-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-6xl font-black mb-3 tracking-tighter"><span class="text-gradient">Ultimate Music Hub</span></h1>
            <p class="text-zinc-500 text-[10px] md:text-sm font-medium uppercase tracking-[0.2em]">Apple Music App Integration V23.9</p>
        </header>

        <div id="search-section" class="max-w-3xl mx-auto mb-8">
            <div class="relative flex flex-col md:flex-row items-stretch md:items-center gap-2 bg-zinc-900 p-2 rounded-2xl md:rounded-3xl border border-zinc-800 focus-within:border-[#10b981]/50 transition-colors">
                <div class="flex flex-1 gap-1">
                    <select id="search-mode" class="bg-zinc-800 text-white px-3 py-3 rounded-xl border border-zinc-700 text-xs md:text-sm font-bold">
                        <option value="artist">👤 아티스트</option>
                        <option value="track">🎵 곡명</option>
                    </select>
                    <input type="text" id="search-input" placeholder="검색어 입력 시 자동 검색됩니다..." class="flex-1 bg-transparent text-white px-3 py-3 focus:outline-none text-base md:text-lg">
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-10">
            <div class="bg-zinc-900/50 p-1 rounded-xl flex border border-zinc-800 w-full max-w-sm">
                <button id="tab-search" onclick="switchTab('search')" class="flex-1 py-3 text-xs md:text-sm font-bold bg-zinc-800 text-white rounded-lg transition-all">디스코그래피</button>
                <button id="tab-fav" onclick="switchTab('fav')" class="flex-1 py-3 text-xs md:text-sm font-bold text-zinc-500 transition-all">☁️ 커스텀 보관함</button>
            </div>
        </div>

        <div id="status-message" class="text-center text-zinc-400 mb-8 hidden font-mono text-xs animate-pulse tracking-widest">ANALYZING DATABASE...</div>

        <div id="artist-selection-container" class="max-w-6xl mx-auto mb-10 hidden">
            <div id="artist-selection-grid" class="grid grid-cols-2 md:flex md:flex-wrap justify-center gap-4 md:gap-6"></div>
        </div>

        <div id="results-controls" class="hidden flex flex-col md:flex-row justify-between items-center gap-4 mb-10 bg-zinc-900/30 p-4 rounded-2xl border border-zinc-800">
            <input type="text" id="local-search-input" oninput="handleLocalSearch()" placeholder="리스트 내 필터링..." class="w-full md:w-80 bg-zinc-950 border border-zinc-800 text-white px-4 py-2.5 rounded-xl text-sm outline-none focus:border-[#10b981]">
            <select id="album-sort-select" onchange="applyAlbumSort()" class="w-full md:w-auto bg-zinc-900 text-white px-4 py-2 rounded-xl text-xs md:text-sm font-bold border border-zinc-800 cursor-pointer">
                <option value="desc">📅 발매일 최신순</option>
                <option value="asc">⏳ 발매일 과거순</option>
            </select>
        </div>

        <div id="sections-container" class="space-y-16"></div>
    </div>
</div>

<div id="studio-view" class="fixed inset-0 lg:bottom-[88px] z-[150] bg-zinc-950/98 backdrop-blur-3xl transition-all duration-500 studio-view-exit flex flex-col">
    <button onclick="closeStudioView()" class="absolute top-4 right-4 md:top-8 md:right-8 p-3 bg-zinc-800 hover:bg-red-500 text-white rounded-full z-[160] shadow-2xl transition-transform hover:rotate-90">

    <div class="max-w-7xl mx-auto w-full p-6 md:p-10 flex flex-col lg:flex-row gap-10">
        <div class="w-full lg:flex-1 flex flex-col lg:h-[calc(100vh-250px)] shrink-0">
            <div class="flex items-center lg:items-end gap-5 md:gap-6 mb-8 shrink-0">
                <img id="studio-cover" src="" onerror="this.src='https://placehold.co/300x300/18181b/10b981?text=No+Cover'" class="w-28 h-28 md:w-56 md:h-56 rounded-2xl shadow-2xl object-cover border border-zinc-800">
                <div class="flex-1 min-w-0 pb-1">
                    <h2 id="studio-title" class="text-2xl md:text-5xl font-black text-white truncate mb-1 leading-tight tracking-tighter">앨범 제목</h2>

                    <div class="flex flex-wrap gap-2 mt-3">
                        <button onclick="copyDeepLink()" class="bg-zinc-800 text-zinc-300 hover:text-white hover:bg-zinc-700 px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold flex items-center gap-1.5 transition-colors">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg> 링크 복사
                        </button>
                        <button id="open-apple-music-btn" class="bg-[#fa243c] text-white hover:bg-[#ff4d64] px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold flex items-center gap-1.5 transition-all shadow-lg hidden">
                            <svg class="w-3.5 h-3.5 fill-white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Apple Music 앱에서 열기
                        </button>

            <div id="studio-track-list" class="lg:overflow-y-auto pr-2 space-y-1 lg:scrollbar-thin"></div>
        </div>
        
        <div class="w-full lg:flex-1 flex flex-col lg:h-[calc(100vh-250px)] border-t lg:border-t-0 lg:border-l border-zinc-800 pt-8 lg:pt-0 lg:pl-10">
            <h3 class="text-2xl font-black text-white mb-8 shrink-0 flex items-center gap-3">📓 Digging Notes</h3>
            <div class="lg:overflow-y-auto pr-3 space-y-10 lg:scrollbar-thin pb-24 md:pb-0">
                <section id="discogs-track-credits-container" class="hidden bg-[#10b981]/5 p-6 rounded-3xl border border-[#10b981]/20">
                    <h5 id="discogs-track-title" class="text-white font-bold text-base md:text-lg mb-4 truncate border-b border-zinc-800 pb-2">🎵 트랙 제목</h5>
                    <div id="discogs-track-data-ui" class="text-sm font-mono space-y-4"></div>
                </section>
                <section><h4 class="text-zinc-500 font-black text-[10px] uppercase mb-4 tracking-[0.3em]">Encyclopedia & Trivia</h4><p id="wiki-credit-text" class="text-sm text-zinc-400 leading-relaxed font-medium"></p></section>
                <section><h4 class="text-zinc-500 font-black text-[10px] uppercase mb-4 tracking-[0.3em]">Full Session Credits</h4><div id="discogs-credit-text" class="text-sm text-zinc-300 font-mono space-y-4"></div></section>
            </div>
        </div>
    </div>
</div>

<div id="global-player" class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl z-[120] transition-transform duration-500 translate-y-full border-t border-zinc-900 shadow-2xl">

    <div class="absolute top-0 left-0 right-0 -mt-[1px]"><input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full bg-zinc-800 h-1 appearance-none cursor-pointer accent-[#10b981]"></div>
    <div class="max-w-7xl mx-auto px-4 py-3 md:py-4 flex items-center justify-between gap-4 md:gap-6">
        <div class="flex items-center gap-3 md:gap-4 flex-1 min-w-0 md:w-1/3 cursor-pointer group" onclick="openStudioView()">
            <img id="player-cover" src="" onerror="this.src='https://placehold.co/100x100/18181b/10b981?text=No+Cover'" class="w-10 h-10 md:w-14 md:h-14 object-cover rounded shadow-lg border border-zinc-800">
            <div class="min-w-0"><h4 id="player-title" class="text-white font-bold truncate text-[11px] md:text-sm">곡 제목</h4><p id="player-artist" class="text-[#10b981] text-[10px] md:text-xs font-bold truncate">아티스트</p></div>
        </div>
        <div class="flex items-center gap-5 md:gap-8 shrink-0">

            <button onclick="playNextTrack()"><svg class="w-6 h-6 fill-zinc-500 hover:fill-white" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>

    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAhqMdOeEw8Z5lwuVebUkMeMsAzEWT2DDQ", authDomain: "owb-digging.firebaseapp.com", databaseURL: "https://owb-digging-default-rtdb.firebaseio.com", projectId: "owb-digging", storageBucket: "owb-digging.firebasestorage.app", messagingSenderId: "96150663418", appId: "1:96150663418:web:c17b3b61e18c670fa31943", measurementId: "G-NGH9PQSPRD" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    let currentUser = null, favorites = [];
    let currentArtist = null, currentArtistId = null, isFavoritesTab = false;
    let albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
    let fetchState = { albumsDone: false, featuresDone: false, itunesDone: false };
    
    let currentAlbumTracks = [], currentTrackIndex = 0, currentAlbumCover = "", currentDiscogsReleaseData = null;
    let playingQueue = [], playingIndex = 0, playingCover = "";
    let albumSortOrder = 'desc', currentFavFolder = '전체 보관함';
    let allFetchedFeatures = [], featureFetchCount = 0;

    function cleanTitleForSearch(title) {
        if (!title) return "";
        return title.replace(/\s*[\(\[].*?(remaster|deluxe|edition|version|bonus|live|expanded|feat|ft).*?[\)\]]/gi, '')
                    .replace(/\s*-\s*(remaster|deluxe|edition|version|bonus|live|expanded|feat|ft).*$/gi, '')
                    .trim();
    }

    function loadJSONP(url) {
        const scriptId = 'jsonp-' + Math.random().toString(36).substr(2, 9);
        const s = document.createElement('script');
        s.id = scriptId; s.src = url;
        s.onload = () => { const el = document.getElementById(scriptId); if(el) el.remove(); };
        s.onerror = () => { const el = document.getElementById(scriptId); if(el) el.remove(); };
        document.body.appendChild(s);
    }

    function signInWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function signOut() { auth.signOut(); }
    auth.onAuthStateChanged(u => {
        const lb = document.getElementById('login-btn'), up = document.getElementById('user-profile');
        if (u) { currentUser = u; lb.classList.add('hidden'); up.classList.remove('hidden'); document.getElementById('user-photo').src = u.photoURL; document.getElementById('user-name').textContent = u.displayName; loadFavoritesFromCloud(); } 
        else { currentUser = null; lb.classList.remove('hidden'); up.classList.add('hidden'); }
    });

    async function loadFavoritesFromCloud() { if (!currentUser) return; const snap = await db.collection('users').doc(currentUser.uid).collection('favorites').get(); favorites = []; snap.forEach(d => favorites.push(d.data())); if (isFavoritesTab) renderFavorites(); else renderAllSections(); }

    function initSearch() {
        const q = document.getElementById('search-input').value.trim(); if (!q) return;
        const mode = document.getElementById('search-mode').value;
        document.getElementById('sections-container').innerHTML = ''; document.getElementById('artist-selection-container').classList.add('hidden'); document.getElementById('status-message').classList.remove('hidden');
        albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] }; 
        fetchState = { albumsDone: false, featuresDone: false, itunesDone: false }; 
        window.itunesAlbums = [];
        loadJSONP(`https://api.deezer.com/search/${mode === 'artist' ? 'artist' : ''}?q=${encodeURIComponent(q)}&limit=12&output=jsonp&callback=${mode === 'artist' ? 'handleArtistSearch' : 'handleTrackGlobalSearch'}`);
    }

    window.handleArtistSearch = function(d) {
        document.getElementById('status-message').classList.add('hidden'); const grid = document.getElementById('artist-selection-grid'); grid.innerHTML = ''; document.getElementById('artist-selection-container').classList.remove('hidden');
        if(!d.data) return;
        d.data.forEach(a => { 
            const div = document.createElement('div'); div.className = "flex flex-col items-center bg-zinc-900/50 p-4 md:p-6 rounded-3xl cursor-pointer hover:bg-zinc-800 transition-colors"; 
            div.onclick = () => selectArtist(a.id, a.name);
            div.innerHTML = `<img src="${a.picture_medium}" class="w-20 h-20 md:w-28 md:h-28 rounded-full mb-3 shadow-lg border border-zinc-700 object-cover"><h4 class="text-white text-center font-bold text-xs md:text-sm truncate w-full">${a.name}</h4>`; 
            grid.appendChild(div); 
        });
    };

    window.selectArtist = function(id, name) { 
        currentArtist = name; currentArtistId = id; window.allFetchedAlbums = []; window.itunesAlbums = []; allFetchedFeatures = []; featureFetchCount = 0;   
        document.getElementById('artist-selection-container').classList.add('hidden'); document.getElementById('status-message').classList.remove('hidden'); 
        
        // 스마트 언어 라우팅 (KR / US)
        const countryCode = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(name) ? 'KR' : 'US';
        loadJSONP(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=album&limit=200&country=${countryCode}&callback=handleItunesAlbums`);
        
        loadJSONP(`https://api.deezer.com/artist/${id}/albums?limit=100&output=jsonp&callback=handleAllAlbumsPage`); 
        loadJSONP(`https://api.deezer.com/search?q=${encodeURIComponent(name)}&limit=100&output=jsonp&callback=handleFeaturedTracks`); 
    };

    window.handleItunesAlbums = function(d) { if(d.results) window.itunesAlbums = d.results; fetchState.itunesDone = true; tryRenderAll(); };
    window.handleAllAlbumsPage = function(d) { if(d.data) window.allFetchedAlbums.push(...d.data); if(d.next) { loadJSONP(d.next + '&output=jsonp&callback=handleAllAlbumsPage'); } else { fetchState.albumsDone = true; tryRenderAll(); } };
    window.handleFeaturedTracks = function(d) { if(d.data) allFetchedFeatures.push(...d.data.filter(t => t.artist.id !== currentArtistId)); featureFetchCount++; if(d.next && featureFetchCount < 4) loadJSONP(d.next + '&output=jsonp&callback=handleFeaturedTracks'); else { fetchState.featuresDone = true; tryRenderAll(); } };

    function tryRenderAll() {
        if (!fetchState.albumsDone || !fetchState.featuresDone || !fetchState.itunesDone) return; 
        document.getElementById('status-message').classList.add('hidden'); document.getElementById('results-controls').classList.remove('hidden'); 
        const seenTitles = new Set();
        
        // Apple Music Priority Sorting
        if (window.itunesAlbums) {
            window.itunesAlbums.forEach(a => {
                const tl = cleanTitleForSearch(a.collectionName).toLowerCase();
                if (!seenTitles.has(tl)) {
                    seenTitles.add(tl);
                    const itunesAlbum = { id: a.collectionId, title: a.collectionName, cover_medium: a.artworkUrl100?.replace('100x100bb', '600x600bb'), release_date: a.releaseDate, artist: { name: a.artistName }, source: 'itunes', trackCount: a.trackCount };
                    const isFeature = !a.artistName.toLowerCase().includes(currentArtist.toLowerCase());
                    if (isFeature) albumsData.features.push(itunesAlbum);
                    else if (tl.includes('live')) albumsData.live.push(itunesAlbum);
                    else if (tl.includes('best of') || tl.includes('greatest hits')) albumsData.compilation.push(itunesAlbum);
                    else if (a.trackCount <= 6 || tl.includes('ep') || tl.includes('single')) albumsData.ep.push(itunesAlbum);
                    else albumsData.regular.push(itunesAlbum);
                }
            });
        }
        // Deezer Fallback
        window.allFetchedAlbums.forEach(a => {
            const tl = cleanTitleForSearch(a.title).toLowerCase();
            if (!seenTitles.has(tl)) {
                seenTitles.add(tl); a.source = 'deezer';
                if (a.record_type === 'compile' || tl.includes('best of')) albumsData.compilation.push(a);
                else if (tl.includes('live')) albumsData.live.push(a);
                else if (a.record_type === 'ep' || a.record_type === 'single') albumsData.ep.push(a);
                else albumsData.regular.push(a);
            }
        });
        renderAllSections();
    }

    function renderAllSections() {
        const c = document.getElementById('sections-container'); c.innerHTML = '';
        const sort = (arr) => arr.sort((a,b) => albumSortOrder === 'desc' ? new Date(b.release_date || 0) - new Date(a.release_date || 0) : new Date(a.release_date || 0) - new Date(b.release_date || 0));
        renderSection('💿 정규 앨범', sort(albumsData.regular), 'album');
        renderSection('📀 EP & 싱글', sort(albumsData.ep), 'album');
        renderSection('🎤 라이브', sort(albumsData.live), 'album');
        renderSection('🤝 참여작', albumsData.features, 'album');
    }

    function renderSection(title, items, type) {
        if (!items.length) return;
        const sh = document.createElement('div');
        sh.innerHTML = `<h3 class="text-xl md:text-2xl font-black mb-6 border-l-4 border-[#10b981] pl-4">${title}</h3><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5 md:gap-8"></div>`;
        document.getElementById('sections-container').appendChild(sh);
        const g = sh.querySelector('div');
        items.forEach(it => {
            const card = document.createElement('div');
            card.className = "group bg-zinc-900/40 rounded-2xl overflow-hidden relative border border-zinc-800/50 cursor-pointer hover:border-[#10b981] transition-all";
            card.onclick = () => playMedia(type, it.id, it.cover_medium, it.title, it.artist.name, true, it.source);
            card.innerHTML = `<div class="aspect-square relative"><img src="${it.cover_medium}" class="w-full h-full object-cover">${it.source === 'itunes' ? '<span class="absolute top-2 left-2 bg-rose-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded shadow">🍎 Apple</span>' : ''}</div><div class="p-3"><h4 class="font-bold text-[11px] md:text-sm truncate">${it.title}</h4></div>`;
            g.appendChild(card);
        });
    }

    // ⭐️ V23.9: Apple Music 앱 실행 (Deep Link)
    window.openInAppleMusic = function(albumId) {
        if (!albumId) return;
        const appUrl = `music://id/${albumId}`, webUrl = `https://music.apple.com/kr/album/${albumId}`;
        window.location.href = appUrl;
        setTimeout(() => { if (document.hasFocus()) window.open(webUrl, '_blank'); }, 500);
    };

    window.playMedia = function(type, id, cover, title, artist, updateUrl = true, source = 'deezer') {
        if(updateUrl) { const url = new URL(window.location); url.searchParams.set('type', type); url.searchParams.set('id', id); url.searchParams.set('source', source); window.history.pushState({}, '', url); }
        currentAlbumCover = cover; currentDiscogsReleaseData = null; currentTrackIndex = 0; 
        document.getElementById('studio-cover').src = cover; document.getElementById('studio-title').textContent = title; document.getElementById('studio-artist').textContent = artist; 
        
        // 애플뮤직 버튼 제어
        const appleBtn = document.getElementById('open-apple-music-btn');
        if (source === 'itunes') {
            appleBtn.classList.remove('hidden');
            appleBtn.onclick = () => openInAppleMusic(id);
        } else { appleBtn.classList.add('hidden'); }
        
        openStudioView();
        
        const countryCode = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(artist) ? 'KR' : 'US';
        if (source === 'itunes') loadJSONP(`https://itunes.apple.com/lookup?id=${id}&entity=song&country=${countryCode}&callback=handleItunesTracks`);
        else loadJSONP(`https://api.deezer.com/album/${id}/tracks?output=jsonp&callback=handleTracks`);
        
        const cleanTitle = cleanTitleForSearch(title);
        fetchAlbumWikiStory(cleanTitle, artist); fetchDiscogsCreditsFromServer(cleanTitle, artist);
    };

    window.handleItunesTracks = function(d) { if (d.results) handleTracks({ data: d.results.filter(t => t.wrapperType === 'track').map(t => ({ id: t.trackId, title: t.trackName, preview: t.previewUrl, artist: { name: t.artistName } })) }); };
    window.handleTracks = function(d) { 
        currentAlbumTracks = d.data; const list = document.getElementById('studio-track-list'); list.innerHTML = ''; 
        currentAlbumTracks.forEach((t, i) => { const hasP = !!t.preview; const div = document.createElement('div'); div.className = `p-3 md:p-4 hover:bg-white/5 cursor-pointer rounded-xl flex items-center gap-4 ${!hasP?'opacity-20':''}`; div.onclick = () => hasP ? playSpecificTrack(i) : null; div.innerHTML = `<span class="text-zinc-600 font-mono w-6 text-center">${i+1}</span> <span class="font-bold flex-1 truncate">${t.title}</span>`; list.appendChild(div); }); 
    };

    function playSpecificTrack(i) { 
        currentTrackIndex = i; playingQueue = [...currentAlbumTracks]; playingIndex = i; playingCover = currentAlbumCover; 
        const t = playingQueue[playingIndex]; document.getElementById('global-player').classList.remove('translate-y-full'); 
        document.getElementById('player-title').textContent = t.title; document.getElementById('player-artist').textContent = t.artist.name; document.getElementById('player-cover').src = playingCover; 
        const audio = document.getElementById('audio-element'); audio.src = t.preview; audio.play();
        document.getElementById('play-icon').classList.add('hidden'); document.getElementById('pause-icon').classList.remove('hidden');
    }

    async function fetchDiscogsCreditsFromServer(title, artist) { 
        const out = document.getElementById('discogs-credit-text'); out.innerHTML = "<span class='animate-pulse text-zinc-500'>Vercel 서버와 통신 중... 🌐</span>"; 
        try { 
            const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(title)}&artistName=${encodeURIComponent(artist)}`); 
            const d = await r.json(); 
            if (d.extraartists?.length) { 
                let h = ""; d.extraartists.forEach(ar => h += `<div class="mb-3"><span class="role-badge">${ar.role}</span><span class="font-bold text-white">${ar.name}</span></div>`); 
                out.innerHTML = h; 
            } else out.innerHTML = "데이터가 없습니다.";
        } catch (e) { out.innerHTML = "오류 발생"; } 
    }

    function openStudioView() { document.getElementById('studio-view').classList.replace('studio-view-exit', 'studio-view-enter'); }
    function closeStudioView() { document.getElementById('studio-view').classList.replace('studio-view-enter', 'studio-view-exit'); }
    function togglePlay() { const a = document.getElementById('audio-element'); if(a.paused) { a.play(); document.getElementById('play-icon').classList.add('hidden'); document.getElementById('pause-icon').classList.remove('hidden'); } else { a.pause(); document.getElementById('play-icon').classList.remove('hidden'); document.getElementById('pause-icon').classList.add('hidden'); } }
    
    document.getElementById('search-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') initSearch(); });
</script>
</body>
