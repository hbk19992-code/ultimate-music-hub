<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Music Hub V20.3 (Session Click Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #09090b; color: #fff; overflow: hidden; height: 100vh; }
        .text-gradient { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-btn { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .role-badge { display: inline-block; background: #27272a; color: #10b981; border: 1px solid #3f3f46; border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: bold; margin-right: 6px; margin-bottom: 6px; }
        @keyframes slideUpFade { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -20px); opacity: 0; } }
        .toast-animate { animation: slideUpFade 3s ease-in-out forwards; }
        #global-player { transition: background 1.5s ease-in-out, transform 0.3s ease; }
        .aura-chill { background: linear-gradient(to right, #0f172a, #312e81, #000000) !important; }
        .aura-groove { background: linear-gradient(to right, #064e3b, #047857, #000000) !important; }
        .aura-hype { background: linear-gradient(to right, #7f1d1d, #b91c1c, #000000) !important; }
        #main-scroll-area { overflow-y: auto; flex-grow: 1; height: 100%; padding-bottom: 40px; }
        .studio-view-enter { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .studio-view-exit { transform: translateY(100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col relative h-screen">

    <div id="toast-container" class="fixed bottom-[110px] left-1/2 z-[120] flex flex-col gap-2 pointer-events-none"></div>

    <div class="absolute top-4 right-4 z-30">
        <button id="login-btn" onclick="signInWithGoogle()" class="bg-white text-black px-4 py-2 rounded-full font-bold text-sm hidden">구글 로그인</button>
        <div id="user-profile" class="flex items-center gap-3 bg-zinc-900 border border-zinc-700 px-3 py-1.5 rounded-full hidden">
            <img id="user-photo" src="" class="w-6 h-6 rounded-full">
            <span id="user-name" class="text-xs font-bold text-white max-w-[100px] truncate">사용자</span>
        </div>
    </div>

<div id="main-scroll-area" class="w-full">
    <div class="max-w-7xl mx-auto pt-10 px-4 md:px-8">
        <header class="mb-6 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-2"><span class="text-gradient">Ultimate Music Hub</span></h1>
            <p class="text-zinc-400 text-sm">V20.3: 강력한 세션 디깅 시스템</p>
        </header>

        <div id="search-section" class="max-w-3xl mx-auto mb-6">
            <div class="relative flex flex-col md:flex-row items-center gap-2 bg-zinc-900 p-2 rounded-2xl border border-zinc-800 shadow-xl">
                <select id="search-mode" class="bg-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none border border-zinc-700 text-sm font-bold">
                    <option value="artist">👤 아티스트명</option>
                    <option value="track">🎵 곡명(Track)</option>
                </select>
                <div class="relative flex-1 w-full">
                    <input type="text" id="search-input" onkeypress="if(event.key === 'Enter') initSearch()" placeholder="검색어를 입력하세요..." class="w-full bg-transparent text-white pl-4 pr-32 py-3 focus:outline-none text-lg">
                    <button onclick="initSearch()" class="absolute right-0 top-0 bottom-0 bg-gradient-btn text-white px-8 rounded-xl font-bold">검색</button>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <div class="bg-zinc-900 p-1 rounded-xl flex border border-zinc-800 w-full max-w-md">
                <button id="tab-search" onclick="switchTab('search')" class="flex-1 py-2.5 text-sm font-bold bg-zinc-800 text-white rounded-lg">디스코그래피</button>
                <button id="tab-fav" onclick="switchTab('fav')" class="flex-1 py-2.5 text-sm font-bold text-zinc-500">클라우드 ☁️</button>
            </div>
        </div>

        <div id="status-message" class="text-center text-zinc-400 mb-8 hidden"><span id="loading-text" class="animate-pulse">로딩 중...</span></div>
        <div id="artist-selection-container" class="max-w-6xl mx-auto mb-10 hidden">
            <h3 id="selection-title" class="text-xl font-bold text-white mb-6 text-center">결과 선택</h3>
            <div id="artist-selection-grid" class="flex flex-wrap justify-center gap-6"></div>
        </div>
        <div id="results-controls" class="hidden flex justify-between items-center gap-4 mb-8 bg-zinc-900/50 p-3 rounded-2xl border border-zinc-800">
            <input type="text" id="local-search-input" oninput="handleLocalSearch()" placeholder="결과 내 검색..." class="bg-zinc-900 border border-zinc-700 text-white px-4 py-2.5 rounded-xl text-sm w-full md:w-80">
        </div>
        <div id="sections-container" class="space-y-12"></div>
    </div>
</div>

<div id="studio-view" class="fixed inset-x-0 top-0 bottom-[88px] z-[80] bg-zinc-950/98 backdrop-blur-2xl transition-transform duration-500 studio-view-exit flex flex-col">
    <button onclick="closeStudioView()" class="absolute top-8 right-8 p-2 bg-zinc-800 rounded-full z-20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg></button>
    <div class="max-w-7xl mx-auto w-full h-full p-6 md:p-10 flex flex-col lg:flex-row gap-10 overflow-hidden">
        <div class="flex-1 flex flex-col h-full overflow-hidden">
            <div class="flex items-end gap-6 mb-6 shrink-0">
                <img id="studio-cover" src="" class="w-32 h-32 md:w-48 md:h-48 rounded-xl object-cover">
                <div class="flex-1 min-w-0 pb-2">
                    <h2 id="studio-title" class="text-3xl md:text-5xl font-extrabold text-white truncate mb-2">앨범 제목</h2>
                    <p id="studio-artist" class="text-xl text-zinc-400 truncate">아티스트</p>
                </div>
            </div>
            <div id="studio-track-list" class="flex-1 overflow-y-auto pr-2 space-y-1 scrollbar-thin"></div>
        </div>
        <div class="flex-1 flex flex-col h-full border-t lg:border-t-0 lg:border-l border-zinc-800 pt-8 lg:pt-0 lg:pl-10 overflow-hidden">
            <h3 class="text-2xl font-extrabold text-white mb-6 shrink-0">📓 Credits</h3>
            <div class="flex-1 overflow-y-auto pr-3 space-y-8 scrollbar-thin">
                <section id="discogs-track-credits-container" class="hidden bg-zinc-900/60 p-5 rounded-2xl border border-[#10b981]/30">
                    <h5 id="discogs-track-title" class="text-[#10b981] font-bold text-sm mb-3">NOW PLAYING</h5>
                    <div id="discogs-track-data-ui" class="text-sm font-mono space-y-2"></div>
                </section>
                <section>
                    <h4 class="text-white font-bold text-sm mb-3 opacity-50 uppercase">Album Wiki</h4>
                    <p id="wiki-credit-text" class="text-sm text-zinc-400 leading-relaxed"></p>
                </section>
                <section>
                    <h4 class="text-white font-bold text-sm mb-3 opacity-50 uppercase">Session Credits</h4>
                    <div id="discogs-credit-text" class="text-sm text-zinc-400 font-mono"></div>
                </section>
            </div>
        </div>
    </div>
</div>

<div id="global-player" class="fixed bottom-0 left-0 right-0 bg-black z-[100] transition-transform duration-300 translate-y-full border-t border-zinc-800 shadow-2xl">
    <audio id="audio-element" src="" crossorigin="anonymous"></audio>
    <div class="absolute top-0 left-0 right-0 -mt-[2px]"><input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full bg-zinc-700 h-1 appearance-none cursor-pointer"></div>
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-4 flex-1 min-w-0 w-1/3 cursor-pointer" onclick="openStudioView()">
            <img id="player-cover" src="" class="w-14 h-14 object-cover rounded-md">
            <div class="min-w-0">
                <h4 id="player-title" class="text-white font-bold truncate text-sm">곡 제목</h4>
                <p id="player-artist" class="text-zinc-400 text-xs truncate">아티스트</p>
            </div>
        </div>
        <div class="flex-1 flex justify-center items-center gap-6 w-1/3">
            <button onclick="playPrevTrack()"><svg class="w-6 h-6 fill-zinc-400" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button onclick="togglePlay()" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-lg"><svg id="play-icon" class="w-6 h-6 fill-black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="pause-icon" class="w-6 h-6 hidden fill-black" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
            <button onclick="playNextTrack()"><svg class="w-6 h-6 fill-zinc-400" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="flex-1 flex justify-end items-center w-1/3">
            <button onclick="closePlayerEntirely()"><svg class="w-5 h-5 stroke-zinc-500" fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
    </div>
</div>

<script>
    // Firebase & Global State
    const firebaseConfig = { apiKey: "AIzaSyAhqMdOeEw8Z5lwuVebUkMeMsAzEWT2DDQ", authDomain: "owb-digging.firebaseapp.com", databaseURL: "https://owb-digging-default-rtdb.firebaseio.com", projectId: "owb-digging", storageBucket: "owb-digging.firebasestorage.app", messagingSenderId: "96150663418", appId: "1:96150663418:web:c17b3b61e18c670fa31943", measurementId: "G-NGH9PQSPRD" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let currentArtist = null, albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
    let currentAlbumTracks = [], currentTrackIndex = 0, currentAlbumCover = "", currentDiscogsReleaseData = null;

    // ⭐️ [해결책] 세션 뮤지션 클릭 처리 함수 (가장 먼저 정의)
    window.searchSessionMusician = function(name) {
        if (!name) return;
        console.log("Searching for session musician:", name);
        closeStudioView();
        const searchInput = document.getElementById('search-input');
        const searchMode = document.getElementById('search-mode');
        if (searchInput && searchMode) {
            searchMode.value = 'artist';
            searchInput.value = name;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            initSearch();
            showToast(`${name} 아티스트 정보를 불러옵니다.`, 'success');
        }
    };

    // ⭐️ [해결책] 클릭 이벤트를 안전하게 처리하는 헬퍼 함수
    function createSessionButton(role, name) {
        const cleanName = name.replace(/\s\(\d+\)$/, ''); // (2) 같은 숫자 제거
        // 텍스트는 안전하게 HTML 인코딩 처리
        return `<span class="mb-2 inline-block"><span class="role-badge">${role}</span><button class="session-btn mr-4 text-white hover:text-[#10b981] font-bold border-b border-zinc-700 hover:border-[#10b981] transition-colors" data-name="${cleanName.replace(/"/g, '&quot;')}">${cleanName}</button></span>`;
    }

    // ⭐️ [해결책] 이벤트 위임 (스튜디오 뷰 안의 클릭 감시)
    document.getElementById('studio-view').addEventListener('click', function(e) {
        if (e.target && e.target.classList.contains('session-btn')) {
            const artistName = e.target.getAttribute('data-name');
            window.searchSessionMusician(artistName);
        }
    });

    // 핵심 로직들
    function showToast(m, t) { /* 위와 동일 */ }
    function openStudioView() { document.getElementById('studio-view').classList.replace('studio-view-exit', 'studio-view-enter'); }
    function closeStudioView() { document.getElementById('studio-view').classList.replace('studio-view-enter', 'studio-view-exit'); }
    
    function initSearch() {
        const q = document.getElementById('search-input').value.trim(); if (!q) return;
        const mode = document.getElementById('search-mode').value;
        document.getElementById('sections-container').innerHTML = ''; document.getElementById('status-message').classList.remove('hidden');
        const s = document.createElement('script');
        s.src = `https://api.deezer.com/search/${mode === 'artist' ? 'artist' : ''}?q=${encodeURIComponent(q)}&limit=10&output=jsonp&callback=${mode === 'artist' ? 'handleArtistSearch' : 'handleTrackGlobalSearch'}`;
        document.body.appendChild(s);
    }

    window.handleArtistSearch = function(d) {
        document.getElementById('status-message').classList.add('hidden');
        const grid = document.getElementById('artist-selection-grid'); grid.innerHTML = '';
        document.getElementById('artist-selection-container').classList.remove('hidden');
        d.data.forEach(a => {
            const div = document.createElement('div'); div.className = "flex flex-col items-center bg-zinc-900 p-4 rounded-xl cursor-pointer hover:border-[#10b981] border border-transparent w-48";
            div.onclick = () => selectArtist(a.id, a.name);
            div.innerHTML = `<img src="${a.picture_medium}" class="w-24 h-24 rounded-full mb-3"><h4 class="text-white text-center font-bold truncate w-full">${a.name}</h4>`;
            grid.appendChild(div);
        });
    };

    window.selectArtist = function(id, name) {
        currentArtist = name; document.getElementById('artist-selection-container').classList.add('hidden');
        const s = document.createElement('script'); s.src = `https://api.deezer.com/artist/${id}/albums?limit=50&output=jsonp&callback=handleAlbums`; document.body.appendChild(s);
    };

    window.handleAlbums = function(d) {
        document.getElementById('results-controls').classList.remove('hidden');
        albumsData.regular = d.data; renderAllSections();
    };

    function renderAllSections() {
        const c = document.getElementById('sections-container'); c.innerHTML = '';
        const sect = document.createElement('div');
        sect.innerHTML = `<h3 class="text-xl font-bold mb-4 border-l-4 border-[#10b981] pl-3">Discography</h3><div class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>`;
        c.appendChild(sect); const g = sect.querySelector('div');
        albumsData.regular.forEach(a => {
            const card = document.createElement('div'); card.className = "bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800 cursor-pointer hover:border-[#10b981]";
            card.onclick = () => playMedia('album', a.id, a.cover_medium, a.title, currentArtist);
            card.innerHTML = `<img src="${a.cover_medium}" class="w-full aspect-square object-cover"><div class="p-3"><h4 class="text-sm font-bold truncate">${a.title}</h4></div>`;
            g.appendChild(card);
        });
    }

    window.playMedia = function(type, id, cover, title, artist) {
        currentAlbumCover = cover; openStudioView();
        document.getElementById('studio-cover').src = cover;
        document.getElementById('studio-title').textContent = title;
        document.getElementById('studio-artist').textContent = artist;
        const s = document.createElement('script'); s.src = `https://api.deezer.com/album/${id}/tracks?output=jsonp&callback=handleTracks`; document.body.appendChild(s);
        fetchDiscogsCreditsFromServer(title, artist);
    };

    window.handleTracks = function(d) {
        currentAlbumTracks = d.data;
        const list = document.getElementById('studio-track-list'); list.innerHTML = '';
        currentAlbumTracks.forEach((t, i) => {
            const div = document.createElement('div'); div.className = "p-3 hover:bg-zinc-800 cursor-pointer rounded-lg text-sm";
            div.onclick = () => playSpecificTrack(i);
            div.innerHTML = `<span class="text-zinc-500 mr-3">${i+1}</span> ${t.title}`;
            list.appendChild(div);
        });
    };

    // ⭐️ [해결책] Vercel API 호출 및 버튼 생성 부분
    async function fetchDiscogsCreditsFromServer(t, a) {
        const out = document.getElementById('discogs-credit-text'); out.innerHTML = "로딩 중...";
        try {
            const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(t)}&artistName=${encodeURIComponent(a)}`);
            const d = await r.json(); currentDiscogsReleaseData = d;
            if (d.extraartists?.length) {
                let h = ""; d.extraartists.forEach(ar => h += createSessionButton(ar.role, ar.name));
                out.innerHTML = h;
            } else out.innerHTML = "정보 없음";
            if (currentAlbumTracks[currentTrackIndex]) updateTrackSpecificCredits(currentAlbumTracks[currentTrackIndex].title);
        } catch (e) { out.innerHTML = "에러"; }
    }

    function updateTrackSpecificCredits(title) {
        const cont = document.getElementById('discogs-track-credits-container'), dataUi = document.getElementById('discogs-track-data-ui');
        if (!currentDiscogsReleaseData?.tracklist) return cont.classList.add('hidden');
        const track = currentDiscogsReleaseData.tracklist.find(tr => tr.title.toLowerCase().includes(title.toLowerCase()));
        if (track?.extraartists?.length) {
            document.getElementById('discogs-track-title').textContent = `🎵 ${track.title}`;
            let h = ""; track.extraartists.forEach(ar => h += createSessionButton(ar.role, ar.name));
            dataUi.innerHTML = h; cont.classList.remove('hidden');
        } else cont.classList.add('hidden');
    }

    // 플레이어 기본 동작
    const audio = document.getElementById('audio-element'), pI = document.getElementById('play-icon'), psI = document.getElementById('pause-icon');
    function playSpecificTrack(i) { currentTrackIndex = i; loadTrack(); }
    function loadTrack() {
        const t = currentAlbumTracks[currentTrackIndex]; if(!t?.preview) return;
        document.getElementById('global-player').classList.remove('translate-y-full');
        document.getElementById('player-title').textContent = t.title;
        document.getElementById('player-artist').textContent = t.artist.name;
        document.getElementById('player-cover').src = currentAlbumCover;
        audio.src = t.preview; audio.play();
        pI.classList.add('hidden'); psI.classList.remove('hidden');
        updateTrackSpecificCredits(t.title);
    }
    function togglePlay() { if(audio.paused) { audio.play(); pI.classList.add('hidden'); psI.classList.remove('hidden'); } else { audio.pause(); pI.classList.remove('hidden'); psI.classList.add('hidden'); } }
    function playNextTrack() { currentTrackIndex = (currentTrackIndex + 1) % currentAlbumTracks.length; loadTrack(); }
    function playPrevTrack() { currentTrackIndex = (currentTrackIndex - 1 + currentAlbumTracks.length) % currentAlbumTracks.length; loadTrack(); }
</script>
</body>
</html>
