    /* 👾 8-BIT RETRO THEME */
    @keyframes crt-flicker { 0% { opacity: 0.98; } 50% { opacity: 0.95; } 100% { opacity: 1; } }
    body.pixel-theme { font-family: 'Galmuri11', 'Galmuri9', sans-serif !important; background-color: #000 !important; animation: crt-flicker 0.15s infinite; cursor: url('https://cdn.custom-cursor.com/db/8222/32/pixel-cursor.png'), auto !important; }
    body.pixel-theme::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none; }
    body.pixel-theme::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%); z-index: 9998; pointer-events: none; }
    body.pixel-theme a, body.pixel-theme button, body.pixel-theme .cursor-pointer, body.pixel-theme select, body.pixel-theme input { cursor: url('https://cdn.custom-cursor.com/db/8221/32/pixel-pointer.png'), pointer !important; }
    body.pixel-theme * { border-radius: 0 !important; transition: none !important; }
    body.pixel-theme img { image-rendering: pixelated !important; border: 2px solid #333 !important; }
    body.pixel-theme .text-gradient { background: none !important; -webkit-text-fill-color: #10b981 !important; text-shadow: 3px 3px 0px #a238ff !important; }
    body.pixel-theme .bg-zinc-900, body.pixel-theme .bg-zinc-800 { background-color: #111 !important; border: 2px solid #10b981 !important; }
    body.pixel-theme .shadow-lg, body.pixel-theme .shadow-2xl, body.pixel-theme .group:hover { box-shadow: 4px 4px 0px rgba(16, 185, 129, 0.8) !important; transform: translate(-2px, -2px) !important; }
    body.pixel-theme input:not([type="range"]), body.pixel-theme select, body.pixel-theme button { border: 2px solid #444 !important; text-transform: uppercase; }
    body.pixel-theme input:focus:not([type="range"]), body.pixel-theme select:focus { border-color: #a238ff !important; }
    body.pixel-theme input[type="range"] { border: none !important; height: 6px !important; background: #333 !important; padding: 0 !important; }
    body.pixel-theme input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 16px; background: #10b981; border: 2px solid #fff; border-radius: 0; cursor: url('https://cdn.custom-cursor.com/db/8221/32/pixel-pointer.png'), pointer; }

    function tryRenderAll() {
        if (!fetchState.albumsDone || !fetchState.featuresDone || !fetchState.itunesDone) return;
        document.getElementById('status-message').classList.add('hidden');
        document.getElementById('results-controls').classList.remove('hidden');
        const seenTitles = new Set(); albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
        const deezerTypeMap = new Map();
        window.allFetchedAlbums.forEach(a => { const tl = cleanTitleForSearch(a.title).toLowerCase(); if(!deezerTypeMap.has(tl)) deezerTypeMap.set(tl, a.record_type); });

        if (window.itunesAlbums) {
            window.itunesAlbums.forEach(a => {
                const tl = cleanTitleForSearch(a.collectionName).toLowerCase();
                if (!seenTitles.has(tl)) {
                    seenTitles.add(tl);
                    const itunesAlbum = { id: a.collectionId, title: a.collectionName, cover_medium: a.artworkUrl100 ? a.artworkUrl100.replace('100x100bb', '600x600bb') : '', release_date: a.releaseDate, record_type: 'itunes', artist: { name: a.artistName }, source: 'itunes', trackCount: a.trackCount };
                    const artistNameLower = a.artistName.toLowerCase(); const searchArtistLower = currentArtist ? currentArtist.toLowerCase() : '';
                    if (searchArtistLower && !artistNameLower.includes(searchArtistLower) && !searchArtistLower.includes(artistNameLower)) { albumsData.features.push(itunesAlbum); }
                    else if (tl.includes('live')) albumsData.live.push(itunesAlbum);
                    else if (tl.includes('best of') || tl.includes('greatest hits') || tl.includes('anthology')) albumsData.compilation.push(itunesAlbum);
                    else {
                        const deezerType = deezerTypeMap.get(tl);
                        if (deezerType === 'ep' || deezerType === 'single') albumsData.ep.push(itunesAlbum);
                        else if (deezerType === 'album') albumsData.regular.push(itunesAlbum);
                        else { if (tl.match(/\b(ep|single|album - ep|album - single)\b/) || a.trackCount <= 1) albumsData.ep.push(itunesAlbum); else albumsData.regular.push(itunesAlbum); }
                    }
                }
            });
        }
        window.allFetchedAlbums.forEach(a => {
            const tl = cleanTitleForSearch(a.title).toLowerCase();
            if (!seenTitles.has(tl)) {
                seenTitles.add(tl); a.source = 'deezer';
                if (a.record_type === 'compile' || tl.includes('best of')) albumsData.compilation.push(a);
                else if (tl.includes('live')) albumsData.live.push(a);

                else albumsData.regular.push(a);

        });
        if (window.deezerUniqueFeatures) {
            window.deezerUniqueFeatures.forEach(t => {
                const tl = cleanTitleForSearch(t.album.title).toLowerCase();
                if (!seenTitles.has(tl)) {
                    seenTitles.add(tl);

    // 역할 카테고리 매핑
    const ROLE_GROUPS = {
        '프로덕션': ['producer', 'produced', 'executive producer', 'co-producer', 'associate producer', 'music producer'],
        '드럼 / 퍼커션': ['drums', 'drum', 'percussion', 'congas', 'bongos', 'tambourine', 'shaker', 'cymbals', 'beatbox'],
        '베이스': ['bass', 'upright bass', 'fretless bass', 'electric bass', 'bass guitar'],
        '기타': ['guitar', 'guitars', 'acoustic guitar', 'electric guitar', 'rhythm guitar', 'lead guitar', 'twelve-string guitar', 'slide guitar', 'classical guitar', 'nylon guitar'],
        '건반 / 피아노': ['piano', 'keyboards', 'organ', 'synthesizer', 'wurlitzer', 'rhodes', 'clavinet', 'accordion', 'harpsichord', 'mellotron', 'moog'],
        '현악기': ['strings', 'violin', 'viola', 'cello', 'double bass', 'string arrangement', 'string section', 'orchestration'],
        '관악기': ['trumpet', 'trombone', 'saxophone', 'sax', 'flute', 'clarinet', 'oboe', 'french horn', 'brass', 'horn', 'baritone', 'tenor', 'alto sax'],
        '보컬': ['vocals', 'voice', 'background vocals', 'backing vocals', 'lead vocals', 'choir', 'harmony', 'chorus', 'rap', 'rapper'],
        '믹싱 / 마스터링': ['mixed', 'mixing', 'mastered', 'mastering', 'recorded', 'recording', 'engineer', 'engineering', 'assisted', 'technician'],
        '편곡': ['arranged', 'arrangement', 'arranger', 'orchestrated', 'conductor'],
        '작사·작곡': ['written', 'composed', 'lyrics', 'music by', 'words by'],
        '아트워크': ['artwork', 'photography', 'design', 'art direction', 'cover design', 'liner notes'],
    };

    function getRoleGroup(roleStr) {
        const lower = roleStr.toLowerCase();
        for (const [group, keywords] of Object.entries(ROLE_GROUPS)) {
            if (keywords.some(k => lower.includes(k))) return group;
        }
        return '기타 크레딧';
    }

    function groupCredits(artists) {
        const groups = {};
        artists.forEach(ar => {
            const group = getRoleGroup(ar.role || '');
            if (!groups[group]) groups[group] = [];
            groups[group].push(ar);
        });
        return groups;
    }

    function renderGroupedCredits(container, artists, showFilter = false) {
        container.innerHTML = '';
        if (!artists || !artists.length) {
            container.innerHTML = "<span class='text-zinc-500 font-bold'>세션 데이터가 없습니다.</span>";
            return;
        }

        const groups = groupCredits(artists);
        const groupKeys = Object.keys(groups);

        // 필터 탭 렌더링
        const filterContainer = document.getElementById('credit-filter-tabs');
        const countBadge = document.getElementById('credit-count-badge');

        if (showFilter && filterContainer) {
            filterContainer.classList.remove('hidden');
            filterContainer.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.className = `px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${activeCreditFilter === 'ALL' ? 'bg-[#10b981] text-black' : 'bg-zinc-900 text-zinc-400 border border-zinc-800 hover:text-white'}`;
            allBtn.textContent = `전체 (${artists.length})`;
            allBtn.onclick = () => { activeCreditFilter = 'ALL'; renderGroupedCredits(container, artists, true); };
            filterContainer.appendChild(allBtn);

            groupKeys.forEach(group => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${activeCreditFilter === group ? 'bg-[#10b981] text-black' : 'bg-zinc-900 text-zinc-400 border border-zinc-800 hover:text-white'}`;
                btn.textContent = `${group} (${groups[group].length})`;
                btn.onclick = () => { activeCreditFilter = group; renderGroupedCredits(container, artists, true); };
                filterContainer.appendChild(btn);
            });

            if (countBadge) { countBadge.classList.remove('hidden'); countBadge.textContent = `총 ${artists.length}명`; }
        }

        // 필터 적용
        const filteredGroups = activeCreditFilter === 'ALL' ? groups : { [activeCreditFilter]: groups[activeCreditFilter] || [] };

        Object.entries(filteredGroups).forEach(([group, members]) => {
            if (!members.length) return;
            const groupEl = document.createElement('div');
            groupEl.className = 'credit-group';
            groupEl.innerHTML = `<div class="credit-group-label">${group}</div>`;
            members.forEach(ar => {
                const cleanName = ar.name.replace(/\s\(\d+\)$/, '');
                const item = document.createElement('div');
                item.className = 'credit-item';
                item.innerHTML = `<span class="role-pill">${ar.role || '–'}</span><button class="session-trigger text-left text-white hover:text-[#10b981] font-black text-sm transition-colors flex-1" data-name="${cleanName.replace(/"/g, '&quot;')}" data-role="${(ar.role||'').replace(/"/g, '&quot;')}">${cleanName}</button>`;
                groupEl.appendChild(item);
            });
            container.appendChild(groupEl);
        });
    }

    // ==========================================
    // ✅ 개선 4-2: 세션 뮤지션 사이드패널
    // ==========================================
    function openSessionPanel(name, role) {
        sessionPanelCurrentName = name;
        sessionPanelCurrentRole = role;
        document.getElementById('session-panel-name').textContent = name;
        document.getElementById('session-panel-role').textContent = role || 'SESSION MUSICIAN';
        document.getElementById('session-panel-content').innerHTML = '';
        document.getElementById('session-panel-stats').classList.add('hidden');
        document.getElementById('session-panel-loading').classList.remove('hidden');
        document.getElementById('session-panel').classList.add('open');
        document.getElementById('session-panel-backdrop').classList.add('open');
        fetchSessionMusicianAlbums(name);
    }

    function closeSessionPanel() {
        document.getElementById('session-panel').classList.remove('open');
        document.getElementById('session-panel-backdrop').classList.remove('open');
    }

    window.closeSessionPanel = closeSessionPanel;

    window.searchSessionFromPanel = function() {
        closeSessionPanel();
        const searchInput = document.getElementById('search-input');
        const searchMode = document.getElementById('search-mode');
        if (searchInput && searchMode) {
            searchMode.value = 'artist';
            searchInput.value = sessionPanelCurrentName;
            clearAutocomplete();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => initSearch(), 400);
        }
    };

    async function fetchSessionMusicianAlbums(name) {
        const content = document.getElementById('session-panel-content');
        const loading = document.getElementById('session-panel-loading');
        const stats = document.getElementById('session-panel-stats');

        try {
            // Deezer에서 해당 아티스트의 앨범 검색
            const cbName = `handleSession_${Date.now()}`;
            await new Promise((resolve) => {
                window[cbName] = (d) => {
                    loading.classList.add('hidden');
                    const results = d.data || [];

                    if (!results.length) {
                        content.innerHTML = `<div class="text-center py-8 text-zinc-600"><p class="font-bold text-sm">Deezer에서 찾을 수 없습니다</p><p class="text-xs mt-2">디스코그래피 검색을 시도해보세요</p></div>`;
                        resolve(); return;
                    }

                    // 아티스트 목록 (이름이 정확히 일치하는 것 우선)
                    const exactMatch = results.find(a => a.name.toLowerCase() === name.toLowerCase());
                    const artist = exactMatch || results[0];

                    // 아티스트 정보 표시
                    stats.classList.remove('hidden');
                    stats.innerHTML = `
                        <div class="col-span-2 flex items-center gap-3 bg-zinc-900/50 p-3 rounded-xl border border-zinc-800">
                            <img src="${artist.picture_medium || artist.picture_small || ''}" onerror="this.style.display='none'" class="w-12 h-12 rounded-full border border-zinc-700 object-cover">
                            <div>
                                <div class="font-black text-white text-sm">${artist.name}</div>
                                ${artist.nb_fan ? `<div class="text-zinc-500 text-[10px] mt-0.5">${(artist.nb_fan/1000).toFixed(0)}K fans</div>` : ''}
                            </div>
                        </div>
                    `;

                    // 해당 아티스트의 앨범 로드
                    const albumCb = `handleSessionAlbums_${Date.now()}`;
                    window[albumCb] = (albumData) => {
                        const albums = (albumData.data || []).slice(0, 20);
                        content.innerHTML = '';

                        if (!albums.length) {
                            content.innerHTML = `<p class="text-zinc-500 text-sm text-center py-4">앨범 정보가 없습니다</p>`;
                            delete window[albumCb]; resolve(); return;
                        }

                        const header = document.createElement('div');
                        header.className = 'text-[10px] text-zinc-500 font-black uppercase tracking-widest mb-3';
                        header.textContent = `디스코그래피 (${albums.length}+)`;
                        content.appendChild(header);

                        albums.forEach(album => {
                            const card = document.createElement('div');
                            card.className = 'session-album-card';
                            const year = album.release_date ? album.release_date.split('-')[0] : '';
                            card.innerHTML = `
                                <img src="${album.cover_medium || album.cover_small || ''}" onerror="this.src='https://placehold.co/52x52/18181b/10b981?text=?'">
                                <div class="info">
                                    <div class="info-title">${album.title}</div>
                                    <div class="info-meta">${year}${album.record_type ? ' · ' + album.record_type.toUpperCase() : ''}</div>
                                </div>
                                <svg class="w-4 h-4 text-zinc-700 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            `;
                            card.onclick = () => {
                                closeSessionPanel();
                                playMedia('album', album.id, album.cover_medium, album.title, artist.name, true, 'deezer');
                            };
                            content.appendChild(card);
                        });

                        delete window[albumCb]; resolve();
                    };
                    loadJSONP(`https://api.deezer.com/artist/${artist.id}/albums?limit=20&output=jsonp&callback=${albumCb}`);
                    delete window[cbName];
                };
                loadJSONP(`https://api.deezer.com/search/artist?q=${encodeURIComponent(name)}&limit=5&output=jsonp&callback=${cbName}`);
            });
        } catch(e) {
            loading.classList.add('hidden');
            content.innerHTML = `<p class="text-rose-400 text-sm text-center py-4">로드 실패: ${e.message}</p>`;
        }
    }

    // 세션 뮤지션 클릭 → 패널 열기 (기존 검색 이동 대신)
    document.getElementById('studio-view').addEventListener('click', function(e) {
        const trigger = e.target.closest('.session-trigger');
        if (trigger) {
            const name = trigger.getAttribute('data-name');
            const role = trigger.getAttribute('data-role');
            openSessionPanel(name, role);
        }
    });

    // ==========================================
    // 8. Discogs 크레딧 + Wikipedia
    // ==========================================
    async function fetchDiscogsCreditsFromServer(title, artist) {
        const out = document.getElementById('discogs-credit-text');
        out.innerHTML = "<span class='animate-pulse text-zinc-500 text-xs'>Vercel 서버와 통신 중... 🌐</span>";
        activeCreditFilter = 'ALL';
        const filterTabs = document.getElementById('credit-filter-tabs');
        if (filterTabs) { filterTabs.classList.add('hidden'); filterTabs.innerHTML = ''; }
        const countBadge = document.getElementById('credit-count-badge');
        if (countBadge) countBadge.classList.add('hidden');

        const cacheKey = `${cleanTitleForSearch(title)}_${artist}`;
        try {
            let d = window.discogsCache[cacheKey];
            if (!d) {
                const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(title)}&artistName=${encodeURIComponent(artist)}`);
                if (!r.ok) { const errorDetail = await r.text(); throw new Error(`HTTP ${r.status} | ${errorDetail}`); }
                d = await r.json(); window.discogsCache[cacheKey] = d;
            }
            currentDiscogsReleaseData = d;

            // ✅ 역할별 그룹핑 렌더링
            if (d.extraartists?.length) {
                renderGroupedCredits(out, d.extraartists, true);
            } else {
                out.innerHTML = "<span class='text-zinc-500 font-bold text-sm'>세션 데이터가 없습니다.</span>";
            }

            if (currentAlbumTracks?.length > 0 && currentAlbumTracks[currentTrackIndex]) {
                updateTrackSpecificCredits(currentAlbumTracks[currentTrackIndex].title);
            }
        } catch (e) {
            out.innerHTML = `<div class="bg-rose-500/10 p-3 rounded-lg border border-rose-500/30"><span class='text-rose-500 font-bold text-xs'>백엔드 에러 발생!</span><br><span class='text-zinc-300 text-[10px] break-all'>${e.message}</span></div>`;
        }
    }

    function updateTrackSpecificCredits(title) {
        const cont = document.getElementById('discogs-track-credits-container');
        const dataUi = document.getElementById('discogs-track-data-ui');
        if (!currentDiscogsReleaseData?.tracklist || !title) return cont.classList.add('hidden');
        const cleanTarget = cleanTitleForSearch(title).toLowerCase();
        const track = currentDiscogsReleaseData.tracklist.find(tr => {
            if (!tr.title) return false;
            const cleanSource = cleanTitleForSearch(tr.title).toLowerCase();
            return cleanSource.includes(cleanTarget) || cleanTarget.includes(cleanSource);
        });
        if (track?.extraartists?.length) {
            document.getElementById('discogs-track-title').textContent = `🎵 ${track.title}`;
            // ✅ 트랙 크레딧도 그룹핑 적용
            renderGroupedCredits(dataUi, track.extraartists, false);
            cont.classList.remove('hidden');
            // 힌트 배너 숨김
            document.getElementById('track-hint-banner').style.display = 'none';
        } else {
            cont.classList.add('hidden');
        }
    }

    // ✅ 개선 2-3: Wikipedia 한국어→영어 폴백
    async function fetchAlbumWikiStory(title, artist) {
        const wikiUI = document.getElementById('wiki-credit-text');
        wikiUI.innerHTML = "<span class='animate-pulse text-zinc-500 text-xs'>데이터베이스 검색 중... 🔍</span>";
        try {
            // 1차: 한국어 위키
            let extract = await fetchWikiExtract('ko', title);

            // 2차: 영어 위키 (한국어 없을 때)
            if (!extract || extract.length < 20) {
                extract = await fetchWikiExtract('en', title);
            }

            // 3차: 영어 위키 "artist album" 쿼리
            if (!extract || extract.length < 20) {
                extract = await fetchWikiExtract('en', `${title} ${artist}`);
            }

            if (extract && extract.length > 20) {
                wikiUI.innerHTML = extract;
                return;
            }

            // 4차: Last.fm
            const LAST_FM_API_KEY = "bc6dfd44dfc503c39ec41ade07e02778";
            const lastFmRes = await fetch(`https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LAST_FM_API_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(title)}&format=json`);
            const lastFmData = await lastFmRes.json();
            if (lastFmData.album?.wiki?.summary) {
                let cleanSummary = lastFmData.album.wiki.summary.replace(/<a href=.*<\/a>/, '').trim();
                wikiUI.innerHTML = `<span class="text-[#10b981] font-bold text-[10px] bg-[#10b981]/20 px-2 py-1 rounded mb-2 inline-block">Last.fm Trivia</span><br>${cleanSummary}`;
            } else {
                wikiUI.innerHTML = "<span class='text-zinc-600 text-sm'>트리비아가 없습니다 💿</span>";
            }
        } catch(e) {
            wikiUI.innerHTML = "<span class='text-zinc-600 text-sm'>로드 실패</span>";
        }
    }

    async function fetchWikiExtract(lang, query) {
        try {
            const res = await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exsentences=5&explaintext=true&origin=*&titles=${encodeURIComponent(query)}`);
            const data = await res.json();
            const pageId = Object.keys(data.query.pages)[0];
            if (pageId === '-1') return null;
            return data.query.pages[pageId].extract || null;
        } catch { return null; }
    }

    function showToast(m, t) {
        const c = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast-animate bg-zinc-900 border ${t === 'success' ? 'border-[#10b981]' : 'border-zinc-500'} text-white px-6 py-3 rounded-full shadow-2xl font-bold text-xs md:text-sm flex items-center gap-2 mb-2`;
        if (document.body.classList.contains('pixel-theme')) {
            toast.innerHTML = `<span>${t==='success'?'▶':'▷'}</span><span class="typing-text"></span>`;
            c.appendChild(toast);
            if (t === 'success') playRetroSound('coin');
            const textSpan = toast.querySelector('.typing-text'); let i = 0;
            const typing = setInterval(() => { textSpan.textContent += m.charAt(i); i++; if (i >= m.length) clearInterval(typing); }, 50);
        } else {
            toast.innerHTML = `<span>${t==='success'?'✅':'✨'}</span><span>${m}</span>`;
            c.appendChild(toast);
        }
        setTimeout(() => toast.remove(), 4000);
    }

    audio.addEventListener('timeupdate', () => { if (audio.duration) document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100; });
    document.getElementById('progress-bar').addEventListener('input', (e) => { if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration; });
</script>
