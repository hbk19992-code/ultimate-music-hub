<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Music Hub V20.2 (Vercel & Digging Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #09090b; color: #fff; overflow: hidden; height: 100vh; }
        .text-gradient { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-btn { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .role-badge { display: inline-block; background: #27272a; color: #10b981; border: 1px solid #3f3f46; border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: bold; margin-right: 6px; margin-bottom: 6px; }
        @keyframes slideUpFade { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -20px); opacity: 0; } }
        .toast-animate { animation: slideUpFade 3s ease-in-out forwards; }
        
        #global-player { transition: background 1.5s ease-in-out, transform 0.3s ease; }
        .aura-chill { background: linear-gradient(to right, #0f172a, #312e81, #000000) !important; }
        .aura-groove { background: linear-gradient(to right, #064e3b, #047857, #000000) !important; }
        .aura-hype { background: linear-gradient(to right, #7f1d1d, #b91c1c, #000000) !important; }
        
        #main-scroll-area { overflow-y: auto; flex-grow: 1; height: 100%; padding-bottom: 40px; }
        .studio-view-enter { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .studio-view-exit { transform: translateY(100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col relative h-screen">

    <div id="toast-container" class="fixed bottom-[110px] left-1/2 z-[120] flex flex-col gap-2 pointer-events-none"></div>

    <div class="absolute top-4 right-4 md:top-8 md:right-8 z-30">
        <button id="login-btn" onclick="signInWithGoogle()" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-full font-bold text-sm hover:bg-zinc-200 transition-colors shadow-lg hidden">구글 로그인</button>
        <div id="user-profile" class="flex items-center gap-3 bg-zinc-900 border border-zinc-700 px-3 py-1.5 rounded-full shadow-lg hidden">
            <img id="user-photo" src="" class="w-6 h-6 rounded-full bg-zinc-800">
            <span id="user-name" class="text-xs font-bold text-white max-w-[100px] truncate">사용자</span>
            <button onclick="signOut()" class="text-xs text-zinc-400 hover:text-white px-2 py-1 rounded">로그아웃</button>
        </div>
    </div>

<div id="main-scroll-area" class="w-full">
    <div class="max-w-7xl mx-auto pt-10 md:pt-14 px-4 md:px-8">
        <header class="mb-6 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-2"><span class="text-gradient tracking-tight">Ultimate Music Hub</span></h1>
            <p class="text-zinc-400 text-sm">트랙 & 세션 통합 디깅 시스템 (Vercel Edition)</p>
        </header>

        <div id="search-section" class="max-w-3xl mx-auto mb-6">
            <div class="relative flex flex-col md:flex-row items-center gap-2 bg-zinc-900 p-2 rounded-2xl border border-zinc-800 shadow-xl">
                <select id="search-mode" class="bg-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none border border-zinc-700 text-sm font-bold cursor-pointer">
                    <option value="artist">👤 아티스트명</option>
                    <option value="track">🎵 곡명(Track)</option>
                </select>
                <div class="relative flex-1 w-full">
                    <input type="text" id="search-input" onkeypress="if(event.key === 'Enter') initSearch()" placeholder="검색어를 입력하세요..." class="w-full bg-transparent text-white pl-4 pr-32 py-3 focus:outline-none text-lg">
                    <button onclick="initSearch()" class="absolute right-0 top-0 bottom-0 bg-gradient-btn text-white px-8 rounded-xl font-bold hover:opacity-90">검색</button>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <div class="bg-zinc-900 p-1 rounded-xl flex border border-zinc-800 w-full max-w-md shadow-lg">
                <button id="tab-search" onclick="switchTab('search')" class="flex-1 py-2.5 text-sm font-bold bg-zinc-800 text-white rounded-lg shadow transition-all">전체 디스코그래피</button>
                <button id="tab-fav" onclick="switchTab('fav')" class="flex-1 py-2.5 text-sm font-bold text-zinc-500 hover:text-white rounded-lg transition-all">클라우드 보관함 ☁️</button>
            </div>
        </div>

        <div id="status-message" class="text-center text-zinc-400 mb-8 hidden">
            <span id="loading-text" class="block text-sm font-bold text-[#10b981] animate-pulse">데이터 분석 중...</span>
        </div>

        <div id="artist-selection-container" class="max-w-6xl mx-auto mb-10 hidden">
            <h3 id="selection-title" class="text-xl font-bold text-white mb-6 text-center">결과를 선택해 주세요 👇</h3>
            <div id="artist-selection-grid" class="flex flex-wrap justify-center gap-6"></div>
        </div>

        <div id="results-controls" class="hidden flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-zinc-900/50 p-3 rounded-2xl border border-zinc-800 shadow-lg">
            <div class="relative w-full md:w-80">
                <input type="text" id="local-search-input" oninput="handleLocalSearch()" placeholder="결과 내 필터링..." class="w-full bg-zinc-900 border border-zinc-700 text-white pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-[#10b981] text-sm shadow-inner transition-colors">
                <svg class="w-4 h-4 absolute left-4 top-3 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-sm w-1/2 md:w-auto">
                    <span class="text-zinc-400 hidden lg:inline">💿 앨범:</span>
                    <select id="album-sort-select" onchange="applyAlbumSort()" class="bg-transparent text-white focus:outline-none cursor-pointer font-bold w-full">
                        <option value="desc">최신순</option>
                        <option value="asc">과거순</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="sections-container" class="space-y-12"></div>
        <div class="w-full h-[120px]"></div>
    </div>
</div>

<div id="studio-view" class="fixed inset-x-0 top-0 bottom-[88px] z-[80] bg-zinc-950/95 backdrop-blur-2xl transition-transform duration-500 studio-view-exit shadow-[0_-10px_50px_rgba(0,0,0,0.8)] overflow-y-auto lg:overflow-hidden flex flex-col">
    
    <button onclick="closeStudioView()" class="absolute top-4 right-4 md:top-8 md:right-8 p-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-full z-20 transition-colors shadow-lg group">
        <svg class="w-6 h-6 text-zinc-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
    </button>

    <div class="max-w-7xl mx-auto w-full h-full p-6 md:p-10 flex flex-col lg:flex-row gap-10">
        
        <div class="flex-1 flex flex-col h-full min-w-0">
            <div class="flex items-end gap-6 mb-6 shrink-0">
                <img id="studio-cover" src="" class="w-32 h-32 md:w-48 md:h-48 rounded-xl shadow-2xl object-cover border border-zinc-800">
                <div class="pb-2 min-w-0 flex-1">
                    <span class="text-[10px] font-bold text-[#10b981] uppercase tracking-widest mb-1.5 block">Album Info</span>
                    <h2 id="studio-title" class="text-3xl md:text-5xl font-extrabold text-white truncate mb-2 tracking-tight">앨범 제목</h2>
                    <p id="studio-artist" class="text-lg md:text-xl text-zinc-400 font-medium truncate">아티스트</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 mb-6 shrink-0 bg-zinc-900/50 p-2 pl-4 rounded-full border border-zinc-800 w-fit">
                <span id="studio-track-count" class="text-zinc-400 text-sm font-bold border-r border-zinc-700 pr-4">0 곡</span>
                <button onclick="playAllTracks()" class="bg-[#10b981] text-black px-6 py-2 rounded-full font-bold hover:bg-emerald-400 hover:scale-105 transition-all flex items-center gap-2 text-sm shadow-lg">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> 전체 재생
                </button>
            </div>

            <div id="studio-loading" class="py-12 text-center text-zinc-500 shrink-0">
                <svg class="animate-spin h-6 w-6 text-[#10b981] mx-auto mb-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" fill="none" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                데이터 로딩 중...
            </div>
            
            <div id="studio-track-list" class="flex-1 overflow-y-auto scrollbar-thin pr-3 space-y-1 hidden pb-8 lg:pb-0"></div>
        </div>

        <div class="flex-1 flex flex-col h-full min-w-0 border-t lg:border-t-0 lg:border-l border-zinc-800 pt-8 lg:pt-0 lg:pl-10">
            <h3 class="text-2xl font-extrabold text-white mb-6 shrink-0 flex items-center gap-2">
                <span class="text-xl">📓</span> 디깅 노트 (Credits)
            </h3>
            <div class="flex-1 overflow-y-auto scrollbar-thin pr-3 space-y-8 pb-8 lg:pb-0">
                <section id="discogs-track-credits-container" class="hidden bg-zinc-900/60 p-5 rounded-2xl border border-[#10b981]/30 shadow-inner">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#10b981] opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-[#10b981]"></span></span>
                            <h4 class="text-[#10b981] font-bold text-sm tracking-wide">NOW PLAYING</h4>
                        </div>
                    </div>
                    <h5 id="discogs-track-title" class="text-white font-bold mb-3 truncate">🎵 트랙 제목</h5>
                    <div id="discogs-track-data-ui" class="text-sm font-mono leading-relaxed space-y-2"></div>
                </section>

                <section>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-[10px] font-bold bg-zinc-800 text-zinc-300 px-2 py-1 rounded">WIKIPEDIA</span>
                        <h4 class="text-white font-bold text-sm">앨범 스토리</h4>
                    </div>
                    <p id="wiki-credit-text" class="text-sm text-zinc-400 leading-relaxed bg-zinc-900/30 p-4 rounded-xl border border-zinc-800/50">수집 중...</p>
                </section>

                <section>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-[10px] font-bold bg-zinc-200 text-black px-2 py-1 rounded tracking-wide">DISCOGS</span>
                        <h4 class="text-white font-bold text-sm">앨범 전체 세션</h4>
                    </div>
                    <div class="bg-zinc-900/30 p-4 rounded-xl border border-zinc-800/50">
                        <p id="discogs-credit-text" class="text-sm text-zinc-400 leading-relaxed font-medium font-mono">로딩 중...</p>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>

<div id="global-player" class="fixed bottom-0 left-0 right-0 bg-black z-[100] transition-transform duration-300 translate-y-full border-t border-zinc-800 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
    <audio id="audio-element" src="" crossorigin="anonymous"></audio>
    <div class="absolute top-0 left-0 right-0 -mt-[2px]"><input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full bg-zinc-700 h-1 rounded-none appearance-none cursor-pointer"></div>
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        
        <div class="flex items-center gap-4 flex-1 min-w-0 w-1/3 cursor-pointer group" onclick="openStudioView()">
            <img id="player-cover" src="" class="w-14 h-14 object-cover rounded-md border border-zinc-800 group-hover:opacity-80 transition-opacity">
            <div class="min-w-0">
                <h4 id="player-title" class="text-white font-bold truncate text-sm group-hover:text-[#10b981] transition-colors">곡 제목</h4>
                <div class="flex items-center gap-2 mt-0.5">
                    <p id="player-artist" class="text-zinc-400 text-xs truncate">아티스트</p>
                    <span id="aura-badge" class="hidden text-[9px] font-bold px-1.5 py-0.5 rounded text-white/80 bg-white/10 backdrop-blur-sm">BPM</span>
                </div>
            </div>
        </div>
        
        <div class="flex-1 flex justify-center items-center gap-6 w-1/3">
            <button onclick="playPrevTrack()"><svg class="w-6 h-6 fill-zinc-400 hover:fill-white transition-colors" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button id="main-play-btn" onclick="togglePlay()" class="w-12 h-12 rounded-full bg-white flex items-center justify-center hover:scale-105 transition-transform shadow-lg"><svg id="play-icon" class="w-6 h-6 ml-1 fill-black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="pause-icon" class="w-6 h-6 hidden fill-black" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
            <button onclick="playNextTrack()"><svg class="w-6 h-6 fill-zinc-400 hover:fill-white transition-colors" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        
        <div class="flex-1 flex justify-end items-center w-1/3">
            <button onclick="closePlayerEntirely()" class="p-2 hover:bg-zinc-800 rounded-full transition-colors group"><svg class="w-5 h-5 stroke-zinc-500 group-hover:stroke-white" fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
    </div>
</div>

<script>
    // 파이어베이스 설정
    const firebaseConfig = { apiKey: "AIzaSyAhqMdOeEw8Z5lwuVebUkMeMsAzEWT2DDQ", authDomain: "owb-digging.firebaseapp.com", databaseURL: "https://owb-digging-default-rtdb.firebaseio.com", projectId: "owb-digging", storageBucket: "owb-digging.firebasestorage.app", messagingSenderId: "96150663418", appId: "1:96150663418:web:c17b3b61e18c670fa31943", measurementId: "G-NGH9PQSPRD" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let currentUser = null, favorites = [];

    // 인증 로직
    auth.onAuthStateChanged(u => {
        const lb = document.getElementById('login-btn'), up = document.getElementById('user-profile');
        if (u) { currentUser = u; lb.classList.add('hidden'); up.classList.remove('hidden'); document.getElementById('user-photo').src = u.photoURL; document.getElementById('user-name').textContent = u.displayName; loadFavoritesFromCloud(); } 
        else { currentUser = null; lb.classList.remove('hidden'); up.classList.add('hidden'); }
    });
    function signInWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function signOut() { auth.signOut(); }
    async function loadFavoritesFromCloud() { if (!currentUser) return; const snap = await db.collection('users').doc(currentUser.uid).collection('favorites').get(); favorites = []; snap.forEach(d => favorites.push(d.data())); if (isFavoritesTab) renderFavorites(); }

    // 전역 상태
    let currentArtist = null, currentArtistId = null, isFavoritesTab = false;
    let albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
    let fetchState = { albumsDone: false, featuresDone: false };
    let expandedSections = { regular: false, ep: false, live: false, compilation: false, features: false };
    let currentAlbumTracks = [], currentTrackIndex = 0, currentAlbumCover = "";
    let targetTrackIdAfterLoad = null;
    let albumSortOrder = 'desc';
    let currentDiscogsReleaseData = null;

    // 공통 유틸리티
    function showToast(m, t = 'success') {
        const container = document.getElementById('toast-container'); const toast = document.createElement('div');
        toast.className = `toast-animate bg-zinc-900 border ${t === 'success' ? 'border-pink-500' : 'border-zinc-500'} text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm flex items-center gap-2 transform`;
        toast.innerHTML = `<span>${t === 'success' ? '❤️' : '🤍'}</span> <span>${m}</span>`;
        container.appendChild(toast); setTimeout(() => { if(toast.parentNode) toast.remove(); }, 3000);
    }

    // ⭐️ [핵심] 세션 뮤지션 클릭 시 디깅 로직
    window.searchSessionMusician = function(m) {
        closeStudioView(); // 1. 스튜디오 뷰 닫기
        const searchInput = document.getElementById('search-input');
        const searchMode = document.getElementById('search-mode');
        if (searchInput && searchMode) {
            searchMode.value = 'artist'; // 2. 아티스트 모드로 변경
            searchInput.value = m; // 3. 이름 입력
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 4. 최상단 이동
            initSearch(); // 5. 검색 실행
            showToast(`${m} 탐색 중...`, 'success');
        }
    };

    // 검색 로직
    function initSearch() {
        const q = document.getElementById('search-input').value.trim(); if (!q) return;
        const mode = document.getElementById('search-mode').value;
        document.getElementById('sections-container').innerHTML = ''; document.getElementById('artist-selection-container').classList.add('hidden'); document.getElementById('status-message').classList.remove('hidden');
        albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] }; fetchState = { albumsDone: false, featuresDone: false };
        const s = document.createElement('script');
        if (mode === 'artist') s.src = `https://api.deezer.com/search/artist?q=${encodeURIComponent(q)}&limit=5&output=jsonp&callback=handleArtistSearch`;
        else s.src = `https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=20&output=jsonp&callback=handleTrackGlobalSearch`;
        document.body.appendChild(s);
    }

    window.handleTrackGlobalSearch = function(d) {
        document.getElementById('status-message').classList.add('hidden');
        if (d.data?.length > 0) {
            const container = document.getElementById('artist-selection-container'), grid = document.getElementById('artist-selection-grid');
            document.getElementById('selection-title').textContent = "검색된 곡들"; container.classList.remove('hidden'); grid.innerHTML = '';
            d.data.forEach(t => {
                const btn = document.createElement('div'); btn.className = "flex flex-col items-center gap-3 bg-zinc-900 border border-zinc-700 p-5 rounded-2xl cursor-pointer hover:border-[#10b981] w-64";
                btn.onclick = () => { targetTrackIdAfterLoad = t.id; playMedia('album', t.album.id, t.album.cover_medium, t.album.title.replace(/'/g, "\\'"), t.artist.name.replace(/'/g, "\\'")); };
                btn.innerHTML = `<img src="${t.album.cover_medium}" class="w-24 h-24 rounded-lg object-cover shadow-lg border-2 border-zinc-700"><div class="text-center w-full"><h4 class="text-white font-bold text-sm truncate">${t.title}</h4><p class="text-[#10b981] text-xs mt-1 truncate">${t.artist.name}</p></div>`;
                grid.appendChild(btn);
            });
        }
    };

    window.handleArtistSearch = function(d) {
        document.getElementById('status-message').classList.add('hidden');
        if (d.data?.length > 0) {
            const container = document.getElementById('artist-selection-container'), grid = document.getElementById('artist-selection-grid');
            document.getElementById('selection-title').textContent = "아티스트를 선택하세요"; container.classList.remove('hidden'); grid.innerHTML = '';
            d.data.forEach(a => {
                const btn = document.createElement('div'); btn.className = "flex flex-col items-center gap-3 bg-zinc-900 border border-zinc-700 p-5 rounded-2xl cursor-pointer hover:border-[#10b981] w-64";
                btn.onclick = () => selectArtist(a.id, a.name);
                btn.innerHTML = `<img src="${a.picture_medium}" class="w-24 h-24 rounded-full object-cover shadow-lg border-4 border-zinc-700"><h4 class="text-white font-extrabold text-lg truncate">${a.name}</h4>`;
                grid.appendChild(btn);
            });
        }
    };

    window.selectArtist = function(id, name) {
        document.getElementById('artist-selection-container').classList.add('hidden'); document.getElementById('status-message').classList.remove('hidden');
        currentArtist = name; currentArtistId = id; window.allFetchedAlbums = [];
        const s1 = document.createElement('script'); s1.src = `https://api.deezer.com/artist/${id}/albums?limit=100&output=jsonp&callback=handleAllAlbumsPage`; document.body.appendChild(s1);
        const s2 = document.createElement('script'); s2.src = `https://api.deezer.com/search?q=${encodeURIComponent(name)}&limit=100&output=jsonp&callback=handleFeaturedTracks`; document.body.appendChild(s2);
    }

    window.handleAllAlbumsPage = function(d) { if(d.data) window.allFetchedAlbums.push(...d.data); if(d.next) { const s = document.createElement('script'); s.src = d.next + '&output=jsonp&callback=handleAllAlbumsPage'; document.body.appendChild(s); } else { fetchState.albumsDone = true; tryRenderAll(); } };
    window.handleFeaturedTracks = function(d) { if(d.data) albumsData.features = d.data.filter(t => t.artist.id !== currentArtistId); fetchState.featuresDone = true; tryRenderAll(); };

    function tryRenderAll() {
        if (!fetchState.albumsDone || !fetchState.featuresDone) return;
        document.getElementById('status-message').classList.add('hidden');
        const sT = new Set(); window.allFetchedAlbums.forEach(a => { const tl = a.title.toLowerCase(); if(!sT.has(tl)) { sT.add(tl); if (a.record_type === 'compile' || tl.includes('best of')) albumsData.compilation.push(a); else if (tl.includes('live')) albumsData.live.push(a); else if (a.record_type === 'ep' || a.record_type === 'single') albumsData.ep.push(a); else albumsData.regular.push(a); } });
        document.getElementById('results-controls').classList.remove('hidden'); renderAllSections();
    }

    function renderAllSections() {
        const c = document.getElementById('sections-container'); c.innerHTML = '';
        const f = (it) => { const q = document.getElementById('local-search-input').value.toLowerCase(); return !q || it.title.toLowerCase().includes(q); };
        const sort = (arr) => arr.sort((a,b) => albumSortOrder === 'desc' ? new Date(b.release_date) - new Date(a.release_date) : new Date(a.release_date) - new Date(b.release_date));
        
        renderSection('💿 정규 앨범', sort(albumsData.regular.filter(f)), 'album', 'regular');
        renderSection('📀 EP & 싱글', sort(albumsData.ep.filter(f)), 'album', 'ep');
        renderSection('🤝 피처링', albumsData.features.filter(f), 'track', 'features');
    }

    function renderSection(t, items, type, key) {
        if (items.length === 0) return;
        const c = document.getElementById('sections-container'), sh = document.createElement('div');
        sh.innerHTML = `<h3 class="text-2xl font-bold mb-4 border-l-4 border-[#10b981] pl-3">${t} <span class="text-zinc-500 text-sm">${items.length}</span></h3><div class="grid grid-cols-2 md:grid-cols-5 gap-5"></div>`; c.appendChild(sh); const g = sh.querySelector('div');
        items.slice(0, expandedSections[key] ? 100 : 10).forEach(it => {
            const cover = type === 'album' ? it.cover_medium : it.album.cover_medium;
            const card = document.createElement('div'); card.className = "group bg-zinc-900 rounded-xl overflow-hidden relative border border-zinc-800 cursor-pointer hover:border-[#10b981] transition-all";
            card.setAttribute('onclick', `playMedia('${type}', ${it.id}, '${cover}', '${it.title.replace(/'/g, "\\'")}', '${(type==='album'?currentArtist:it.artist.name).replace(/'/g, "\\'")}')`);
            card.innerHTML = `<img src="${cover}" class="w-full aspect-square object-cover"><div class="p-3"><h4 class="font-bold text-sm truncate">${it.title}</h4><p class="text-zinc-500 text-[10px] mt-0.5">${type==='album'?(it.release_date?it.release_date.split('-')[0]:''):'Feat.'}</p></div>`;
            g.appendChild(card);
        });
    }

    // 스튜디오 뷰 로직
    window.openStudioView = function() { const sv = document.getElementById('studio-view'); sv.classList.remove('studio-view-exit'); sv.classList.add('studio-view-enter'); }
    window.closeStudioView = function() { const sv = document.getElementById('studio-view'); sv.classList.remove('studio-view-enter'); sv.classList.add('studio-view-exit'); }

    window.playMedia = function(type, id, cover, title, artist) {
        currentAlbumCover = cover; currentDiscogsReleaseData = null;
        document.getElementById('studio-cover').src = cover;
        document.getElementById('studio-title').textContent = title;
        document.getElementById('studio-artist').textContent = artist;
        document.getElementById('wiki-credit-text').textContent = "수집 중...";
        document.getElementById('discogs-credit-text').textContent = "호출 중...";
        document.getElementById('discogs-track-credits-container').classList.add('hidden');
        
        fetchAlbumWikiStory(title, artist); 
        fetchDiscogsCreditsFromServer(title, artist);

        if (type === 'album') {
            document.getElementById('studio-loading').classList.remove('hidden');
            document.getElementById('studio-track-list').classList.add('hidden');
            window.allFetchedTracks = [];
            const s = document.createElement('script'); s.src = `https://api.deezer.com/album/${id}/tracks?limit=100&output=jsonp&callback=handleAllTracksPage`; document.body.appendChild(s);
            openStudioView();
        } else {
            const s = document.createElement('script'); s.src = `https://api.deezer.com/track/${id}?output=jsonp&callback=handleSingleTrack`; document.body.appendChild(s);
            document.getElementById('global-player').classList.remove('translate-y-full');
            openStudioView();
        }
    }

    window.handleAllTracksPage = function(d) { 
        if(d.data) window.allFetchedTracks.push(...d.data); 
        if(d.next) { const s = document.createElement('script'); s.src = d.next + '&output=jsonp&callback=handleAllTracksPage'; document.body.appendChild(s); } 
        else { renderTracklistStudio(); } 
    };

    function renderTracklistStudio() {
        document.getElementById('studio-loading').classList.add('hidden');
        const list = document.getElementById('studio-track-list'); list.classList.remove('hidden');
        currentAlbumTracks = window.allFetchedTracks;
        document.getElementById('studio-track-count').textContent = `${currentAlbumTracks.length} 곡`;
        let html = '';
        currentAlbumTracks.forEach((t, i) => {
            const hasP = !!t.preview;
            html += `<div id="track-row-${i}" onclick="${hasP ? `playSpecificTrack(${i})` : `showToast('미리듣기 없음', 'info')`}" class="flex items-center justify-between p-3 border-b border-zinc-800/30 ${hasP ? 'cursor-pointer hover:bg-zinc-800/50' : 'opacity-30'} rounded-lg">
                <div class="flex items-center gap-4 min-w-0 flex-1"><span class="text-zinc-600 text-sm w-4">${i+1}</span><div class="min-w-0"><h4 class="text-white font-bold text-sm truncate">${t.title}</h4><p class="text-zinc-500 text-[11px]">${t.artist.name}</p></div></div>
            </div>`;
        });
        list.innerHTML = html;
        if (targetTrackIdAfterLoad) {
            const idx = currentAlbumTracks.findIndex(t => t.id == targetTrackIdAfterLoad);
            if (idx !== -1 && currentAlbumTracks[idx].preview) playSpecificTrack(idx);
            targetTrackIdAfterLoad = null;
        }
    }

    // ⭐️ [Vercel 백엔드 연동] 크레딧 로직
    async function fetchDiscogsCreditsFromServer(t, a) {
        try {
            // 🚨 핵심 수정: Vercel용 /api 경로로 호출
            const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(t)}&artistName=${encodeURIComponent(a)}`);
            const d = await r.json(); currentDiscogsReleaseData = d;
            if (d.extraartists?.length) {
                let h = ""; d.extraartists.slice(0, 40).forEach(ar => {
                    let cn = ar.name.replace(/\s\(\d+\)$/, '');
                    h += `<span class="role-badge">${ar.role}</span> <button onclick="searchSessionMusician('${cn.replace(/'/g, "\\'")}')" class="mr-3 text-white hover:text-[#10b981] font-bold border-b border-zinc-700 hover:border-[#10b981] mb-2">${cn}</button>`;
                }); document.getElementById('discogs-credit-text').innerHTML = h;
            } else { document.getElementById('discogs-credit-text').innerHTML = "정보 없음"; }
            if (currentAlbumTracks[currentTrackIndex]) updateTrackSpecificCredits(currentAlbumTracks[currentTrackIndex].title);
        } catch (e) { document.getElementById('discogs-credit-text').innerHTML = "에러 발생"; }
    }

    function updateTrackSpecificCredits(title) {
        const container = document.getElementById('discogs-track-credits-container'), trackTitleUI = document.getElementById('discogs-track-title'), trackDataUI = document.getElementById('discogs-track-data-ui');
        if (!currentDiscogsReleaseData?.tracklist) return container.classList.add('hidden');
        const match = currentDiscogsReleaseData.tracklist.find(tr => tr.title.toLowerCase().includes(title.toLowerCase()) || title.toLowerCase().includes(tr.title.toLowerCase()));
        if (match?.extraartists?.length) {
            trackTitleUI.innerHTML = `🎵 ${match.title}`;
            let h = ""; match.extraartists.slice(0, 20).forEach(ar => {
                let cn = ar.name.replace(/\s\(\d+\)$/, '');
                h += `<span class="role-badge border-[#10b981] text-[#10b981]">${ar.role}</span> <button onclick="searchSessionMusician('${cn.replace(/'/g, "\\'")}')" class="mr-2 text-white hover:text-[#10b981] font-bold border-b border-zinc-700 hover:border-[#10b981] mb-2">${cn}</button>`;
            }); trackDataUI.innerHTML = h; container.classList.remove('hidden');
        } else container.classList.add('hidden');
    }

    async function fetchAlbumWikiStory(t, a) {
        try {
            const r = await fetch(`https://ko.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exsentences=5&explaintext=true&origin=*&titles=${encodeURIComponent(t)}`);
            const d = await r.json(); const id = Object.keys(d.query.pages)[0];
            document.getElementById('wiki-credit-text').innerHTML = d.query.pages[id].extract || "정보 없음";
        } catch(e){}
    }

    // 플레이어 컨트롤
    const audio = document.getElementById('audio-element'), pI = document.getElementById('play-icon'), psI = document.getElementById('pause-icon');
    window.handleSingleTrack = function(d) { if (d?.preview) { currentAlbumTracks = [d]; currentTrackIndex = 0; loadTrack(); } };
    window.playSpecificTrack = function(i) { currentTrackIndex = i; document.getElementById('global-player').classList.remove('translate-y-full'); loadTrack(); }
    
    function loadTrack() {
        const t = currentAlbumTracks[currentTrackIndex]; if(!t?.preview) return;
        document.getElementById('player-title').textContent = t.title;
        document.getElementById('player-artist').textContent = t.artist.name;
        document.getElementById('player-cover').src = currentAlbumCover;
        const rows = document.querySelectorAll('[id^="track-row-"]'); rows.forEach(r => r.classList.remove('bg-zinc-800/80', 'border-l-4', 'border-l-[#10b981]'));
        const active = document.getElementById(`track-row-${currentTrackIndex}`); if(active) active.classList.add('bg-zinc-800/80', 'border-l-4', 'border-l-[#10b981]');
        updateTrackSpecificCredits(t.title);
        const player = document.getElementById('global-player');
        player.classList.remove('aura-chill', 'aura-groove', 'aura-hype');
        window[`handleBpm_${t.id}`] = function(d) {
            if(d.bpm) {
                document.getElementById('aura-badge').textContent = `${d.bpm} BPM`; document.getElementById('aura-badge').classList.remove('hidden');
                if(d.bpm < 90) player.classList.add('aura-chill'); else if(d.bpm <= 120) player.classList.add('aura-groove'); else player.classList.add('aura-hype');
            }
        };
        const s = document.createElement('script'); s.src = `https://api.deezer.com/track/${t.id}?output=jsonp&callback=handleBpm_${t.id}`; document.body.appendChild(s);
        audio.src = t.preview.replace(/^http:\/\//i, 'https://'); audio.load(); audio.play().then(() => { pI.classList.add('hidden'); psI.classList.remove('hidden'); }).catch(() => showToast('재생 버튼을 누르세요', 'info'));
    }

    function togglePlay() { if (audio.paused) { audio.play(); pI.classList.add('hidden'); psI.classList.remove('hidden'); } else { audio.pause(); pI.classList.remove('hidden'); psI.classList.add('hidden'); } }
    function playNextTrack() { if(currentAlbumTracks.length > 1) { currentTrackIndex = (currentTrackIndex + 1) % currentAlbumTracks.length; loadTrack(); } }
    function playPrevTrack() { if(currentAlbumTracks.length > 1) { currentTrackIndex = (currentTrackIndex - 1 + currentAlbumTracks.length) % currentAlbumTracks.length; loadTrack(); } }
    audio.addEventListener('ended', playNextTrack);
    audio.addEventListener('timeupdate', () => { if (audio.duration) document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100; });
    document.getElementById('progress-bar').addEventListener('input', (e) => { if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration; });
    window.closePlayerEntirely = function() { audio.pause(); document.getElementById('global-player').classList.add('translate-y-full'); closeStudioView(); }
    window.handleLocalSearch = function() { renderAllSections(); }
    window.switchTab = function(t) { isFavoritesTab = (t === 'fav'); renderAllSections(); }
    window.applyAlbumSort = function() { albumSortOrder = document.getElementById('album-sort-select').value; renderAllSections(); }
</script>
</body>
</html>
