<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Music Hub V20.5 (All Features Integrated)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #09090b; color: #fff; overflow: hidden; height: 100vh; }
        .text-gradient { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-btn { background: linear-gradient(135deg, #a238ff 0%, #10b981 100%); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .role-badge { display: inline-block; background: #27272a; color: #10b981; border: 1px solid #3f3f46; border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: bold; margin-right: 6px; margin-bottom: 6px; pointer-events: none; }
        @keyframes slideUpFade { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -20px); opacity: 0; } }
        .toast-animate { animation: slideUpFade 3s ease-in-out forwards; }
        #global-player { transition: background 1.5s ease-in-out, transform 0.3s ease; }
        .aura-chill { background: linear-gradient(to right, #0f172a, #312e81, #000000) !important; }
        .aura-groove { background: linear-gradient(to right, #064e3b, #047857, #000000) !important; }
        .aura-hype { background: linear-gradient(to right, #7f1d1d, #b91c1c, #000000) !important; }
        #main-scroll-area { overflow-y: auto; flex-grow: 1; height: 100%; padding-bottom: 40px; }
        .studio-view-enter { transform: translateY(0); opacity: 1; pointer-events: auto; visibility: visible; }
        .studio-view-exit { transform: translateY(100%); opacity: 0; pointer-events: none; visibility: hidden; }
    </style>
</head>
<body class="flex flex-col relative h-screen">

    <div id="toast-container" class="fixed bottom-[110px] left-1/2 z-[120] flex flex-col gap-2 pointer-events-none"></div>

<div id="main-scroll-area" class="w-full">
    <div class="max-w-7xl mx-auto pt-10 px-4 md:px-8">
        <header class="mb-6 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-2"><span class="text-gradient">Ultimate Music Hub</span></h1>
            <p class="text-zinc-400 text-sm">연도별 분류 & 통합 세션 디깅 시스템</p>
        </header>

        <div id="search-section" class="max-w-3xl mx-auto mb-6">
            <div class="relative flex flex-col md:flex-row items-center gap-2 bg-zinc-900 p-2 rounded-2xl border border-zinc-800 shadow-xl">
                <select id="search-mode" class="bg-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none border border-zinc-700 text-sm font-bold cursor-pointer">
                    <option value="artist">👤 아티스트명</option>
                    <option value="track">🎵 곡명(Track)</option>
                </select>
                <div class="relative flex-1 w-full">
                    <input type="text" id="search-input" onkeypress="if(event.key === 'Enter') initSearch()" placeholder="검색어를 입력하세요..." class="w-full bg-transparent text-white pl-4 pr-32 py-3 focus:outline-none text-lg">
                    <button onclick="initSearch()" class="absolute right-0 top-0 bottom-0 bg-gradient-btn text-white px-8 rounded-xl font-bold hover:opacity-90">검색</button>
                </div>
            </div>
        </div>

        <div id="status-message" class="text-center text-zinc-400 mb-8 hidden">
            <span id="loading-text" class="block text-sm font-bold text-[#10b981] animate-pulse">데이터 분석 중...</span>
        </div>

        <div id="artist-selection-container" class="max-w-6xl mx-auto mb-10 hidden">
            <h3 id="selection-title" class="text-xl font-bold text-white mb-6 text-center">결과 선택</h3>
            <div id="artist-selection-grid" class="flex flex-wrap justify-center gap-6"></div>
        </div>

        <div id="results-controls" class="hidden flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-zinc-900/50 p-3 rounded-2xl border border-zinc-800 shadow-lg">
            <div class="relative w-full md:w-80">
                <input type="text" id="local-search-input" oninput="handleLocalSearch()" placeholder="현재 결과 내에서 필터링..." class="w-full bg-zinc-900 border border-zinc-700 text-white pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-[#10b981] text-sm shadow-inner transition-colors">
            </div>
            <div class="flex gap-2">
                <select id="album-sort-select" onchange="applyAlbumSort()" class="bg-zinc-800 text-white px-4 py-2 rounded-xl text-sm font-bold cursor-pointer border border-zinc-700">
                    <option value="desc">최신순</option>
                    <option value="asc">과거순</option>
                </select>
            </div>
        </div>

        <div id="sections-container" class="space-y-12"></div>
        <div class="w-full h-[120px]"></div>
    </div>
</div>

<div id="studio-view" class="fixed inset-x-0 top-0 bottom-[88px] z-[80] bg-zinc-950/98 backdrop-blur-3xl transition-all duration-500 studio-view-exit flex flex-col">
    <button onclick="closeStudioView()" class="absolute top-8 right-8 p-3 bg-zinc-800 hover:bg-zinc-700 rounded-full z-[90]"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M19 9l-7 7-7-7"></path></svg></button>
    <div class="max-w-7xl mx-auto w-full h-full p-6 md:p-10 flex flex-col lg:flex-row gap-10 overflow-hidden">
        <div class="flex-1 flex flex-col h-full overflow-hidden">
            <div class="flex items-end gap-6 mb-6 shrink-0">
                <img id="studio-cover" src="" class="w-32 h-32 md:w-48 md:h-48 rounded-2xl shadow-2xl object-cover">
                <div class="flex-1 min-w-0 pb-2">
                    <h2 id="studio-title" class="text-2xl md:text-5xl font-extrabold text-white truncate mb-2">앨범 제목</h2>
                    <p id="studio-artist" class="text-lg md:text-xl text-[#10b981] font-bold truncate">아티스트</p>
                </div>
            </div>
            <div id="studio-track-list" class="flex-1 overflow-y-auto pr-2 space-y-1 scrollbar-thin"></div>
        </div>
        <div class="flex-1 flex flex-col h-full border-t lg:border-t-0 lg:border-l border-zinc-800 pt-8 lg:pt-0 lg:pl-10 overflow-hidden">
            <h3 class="text-2xl font-extrabold text-white mb-6 shrink-0 flex items-center gap-2">📓 Digging Note</h3>
            <div class="flex-1 overflow-y-auto pr-3 space-y-8 scrollbar-thin">
                <section id="discogs-track-credits-container" class="hidden bg-zinc-900/60 p-5 rounded-2xl border border-[#10b981]/30">
                    <h5 id="discogs-track-title" class="text-[#10b981] font-bold text-sm mb-4">NOW PLAYING</h5>
                    <div id="discogs-track-data-ui" class="text-sm font-mono space-y-3"></div>
                </section>
                <section><h4 class="text-zinc-500 font-bold text-xs uppercase mb-3 tracking-widest">Wiki Story</h4><p id="wiki-credit-text" class="text-sm text-zinc-300 leading-relaxed"></p></section>
                <section><h4 class="text-zinc-500 font-bold text-xs uppercase mb-3 tracking-widest">Full Session Credits</h4><div id="discogs-credit-text" class="text-sm text-zinc-300 font-mono space-y-3"></div></section>
            </div>
        </div>
    </div>
</div>

<div id="global-player" class="fixed bottom-0 left-0 right-0 bg-black z-[100] transition-transform duration-300 translate-y-full border-t border-zinc-800">
    <audio id="audio-element" src="" crossorigin="anonymous"></audio>
    <div class="absolute top-0 left-0 right-0 -mt-[2px]"><input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full bg-zinc-700 h-1 appearance-none cursor-pointer"></div>
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-4 flex-1 min-w-0 w-1/3 cursor-pointer group" onclick="openStudioView()">
            <img id="player-cover" src="" class="w-14 h-14 object-cover rounded-md group-hover:opacity-70">
            <div class="min-w-0"><h4 id="player-title" class="text-white font-bold truncate text-sm">곡 제목</h4><p id="player-artist" class="text-[#10b981] text-xs truncate">아티스트</p></div>
        </div>
        <div class="flex-1 flex justify-center items-center gap-6 w-1/3">
            <button onclick="playPrevTrack()"><svg class="w-6 h-6 fill-zinc-400 hover:fill-white" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button onclick="togglePlay()" class="w-12 h-12 rounded-full bg-white flex items-center justify-center hover:scale-105"><svg id="play-icon" class="w-6 h-6 fill-black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="pause-icon" class="w-6 h-6 hidden fill-black" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
            <button onclick="playNextTrack()"><svg class="w-6 h-6 fill-zinc-400 hover:fill-white" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="flex-1 flex justify-end items-center w-1/3"><button onclick="closePlayerEntirely()" class="p-2 text-zinc-500 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    </div>
</div>

<script>
    // 1. 초기화 및 상태
    let currentArtist = null, currentArtistId = null;
    let albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
    let fetchState = { albumsDone: false, featuresDone: false };
    let currentAlbumTracks = [], currentTrackIndex = 0, currentAlbumCover = "", currentDiscogsReleaseData = null;
    let albumSortOrder = 'desc';

    // ⭐️ 2. 세션 클릭 디깅 핵심 로직 (Event Delegation 적용)
    window.searchSessionMusician = function(name) {
        if (!name) return;
        closeStudioView();
        const searchInput = document.getElementById('search-input');
        const searchMode = document.getElementById('search-mode');
        if (searchInput && searchMode) {
            searchMode.value = 'artist';
            searchInput.value = name;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { initSearch(); showToast(`${name} (세션) 탐색!`, 'success'); }, 300);
        }
    };

    function createSessionElement(role, name) {
        const cleanName = name.replace(/\s\(\d+\)$/, '');
        return `<div class="mb-2 flex items-start gap-2"><span class="role-badge shrink-0">${role}</span><button class="session-trigger text-left text-white hover:text-[#10b981] font-bold border-b border-zinc-800 hover:border-[#10b981] transition-all" data-name="${cleanName.replace(/"/g, '&quot;')}">${cleanName}</button></div>`;
    }

    document.getElementById('studio-view').addEventListener('click', function(e) {
        const trigger = e.target.closest('.session-trigger');
        if (trigger) window.searchSessionMusician(trigger.getAttribute('data-name'));
    });

    // 3. 검색 및 데이터 패치 (분류 로직 포함)
    function initSearch() {
        const q = document.getElementById('search-input').value.trim(); if (!q) return;
        const mode = document.getElementById('search-mode').value;
        document.getElementById('sections-container').innerHTML = ''; 
        document.getElementById('artist-selection-container').classList.add('hidden'); 
        document.getElementById('status-message').classList.remove('hidden');
        
        albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
        fetchState = { albumsDone: false, featuresDone: false };

        if (mode === 'artist') {
            const s = document.createElement('script');
            s.src = `https://api.deezer.com/search/artist?q=${encodeURIComponent(q)}&limit=10&output=jsonp&callback=handleArtistSearch`;
            document.body.appendChild(s);
        } else {
            const s = document.createElement('script');
            s.src = `https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=20&output=jsonp&callback=handleTrackGlobalSearch`;
            document.body.appendChild(s);
        }
    }

    window.handleArtistSearch = function(d) {
        document.getElementById('status-message').classList.add('hidden');
        const grid = document.getElementById('artist-selection-grid'); grid.innerHTML = '';
        document.getElementById('artist-selection-container').classList.remove('hidden');
        d.data.forEach(a => {
            const div = document.createElement('div'); div.className = "flex flex-col items-center bg-zinc-900 p-5 rounded-2xl cursor-pointer hover:border-[#10b981] border border-transparent w-48 transition-all";
            div.onclick = () => selectArtist(a.id, a.name);
            div.innerHTML = `<img src="${a.picture_medium}" class="w-24 h-24 rounded-full mb-3 shadow-lg border-2 border-zinc-800"><h4 class="text-white text-center font-bold truncate w-full">${a.name}</h4>`;
            grid.appendChild(div);
        });
    };

    window.selectArtist = function(id, name) {
        currentArtist = name; currentArtistId = id; window.allFetchedAlbums = [];
        document.getElementById('artist-selection-container').classList.add('hidden');
        document.getElementById('status-message').classList.remove('hidden');
        const s1 = document.createElement('script'); s1.src = `https://api.deezer.com/artist/${id}/albums?limit=100&output=jsonp&callback=handleAllAlbumsPage`;
        const s2 = document.createElement('script'); s2.src = `https://api.deezer.com/search?q=${encodeURIComponent(name)}&limit=100&output=jsonp&callback=handleFeaturedTracks`;
        document.body.appendChild(s1); document.body.appendChild(s2);
    };

    window.handleAllAlbumsPage = function(d) {
        if(d.data) window.allFetchedAlbums.push(...d.data);
        if(d.next) { const s = document.createElement('script'); s.src = d.next + '&output=jsonp&callback=handleAllAlbumsPage'; document.body.appendChild(s); }
        else { fetchState.albumsDone = true; tryRenderAll(); }
    };

    window.handleFeaturedTracks = function(d) {
        if(d.data) albumsData.features = d.data.filter(t => t.artist.id !== currentArtistId);
        fetchState.featuresDone = true; tryRenderAll();
    };

    // ⭐️ 4. 대망의 분류 및 정렬 로직 복구
    function tryRenderAll() {
        if (!fetchState.albumsDone || !fetchState.featuresDone) return;
        document.getElementById('status-message').classList.add('hidden');
        document.getElementById('results-controls').classList.remove('hidden');

        const seenTitles = new Set();
        window.allFetchedAlbums.forEach(a => {
            const tl = a.title.toLowerCase();
            if(!seenTitles.has(tl)) {
                seenTitles.add(tl);
                if (a.record_type === 'compile' || tl.includes('best of')) albumsData.compilation.push(a);
                else if (tl.includes('live')) albumsData.live.push(a);
                else if (a.record_type === 'ep' || a.record_type === 'single') albumsData.ep.push(a);
                else albumsData.regular.push(a);
            }
        });
        renderAllSections();
    }

    function renderAllSections() {
        const c = document.getElementById('sections-container'); c.innerHTML = '';
        const f = (it) => { const q = document.getElementById('local-search-input').value.toLowerCase(); return !q || it.title.toLowerCase().includes(q); };
        const sort = (arr) => arr.sort((a,b) => albumSortOrder === 'desc' ? new Date(b.release_date || 0) - new Date(a.release_date || 0) : new Date(a.release_date || 0) - new Date(b.release_date || 0));

        renderSection('💿 정규 앨범', sort(albumsData.regular.filter(f)), 'album');
        renderSection('📀 EP & 싱글', sort(albumsData.ep.filter(f)), 'album');
        renderSection('💽 컴필레이션', sort(albumsData.compilation.filter(f)), 'album');
        renderSection('🎤 라이브', sort(albumsData.live.filter(f)), 'album');
        renderSection('🤝 피처링 참여곡', albumsData.features.filter(f), 'track');
    }

    function renderSection(title, items, type) {
        if (items.length === 0) return;
        const c = document.getElementById('sections-container'), sh = document.createElement('div');
        sh.innerHTML = `<h3 class="text-2xl font-bold mb-6 border-l-4 border-[#10b981] pl-4">${title} <span class="text-zinc-500 text-sm font-normal">${items.length}</span></h3><div class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>`;
        c.appendChild(sh); const g = sh.querySelector('div');
        items.forEach(it => {
            const cover = type === 'album' ? it.cover_medium : it.album.cover_medium;
            const year = it.release_date ? it.release_date.split('-')[0] : '';
            const card = document.createElement('div'); card.className = "bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 cursor-pointer hover:border-[#10b981] transition-all";
            const safeT = it.title.replace(/'/g,"\\'"), safeA = (type==='album'?currentArtist:it.artist.name).replace(/'/g,"\\'");
            card.onclick = () => playMedia(type, it.id, cover, safeT, safeA);
            card.innerHTML = `<img src="${cover}" class="w-full aspect-square object-cover"><div class="p-4"><h4 class="font-bold text-sm truncate">${it.title}</h4><p class="text-zinc-500 text-xs mt-1">${year}</p></div>`;
            g.appendChild(card);
        });
    }

    // 5. 스튜디오 뷰 및 세션 로딩
    window.playMedia = function(type, id, cover, title, artist) {
        currentAlbumCover = cover; currentDiscogsReleaseData = null;
        document.getElementById('studio-cover').src = cover;
        document.getElementById('studio-title').textContent = title;
        document.getElementById('studio-artist').textContent = artist;
        openStudioView();
        
        const s = document.createElement('script'); s.src = `https://api.deezer.com/${type}/${id}/${type==='album'?'tracks':''}?output=jsonp&callback=handleTracks`;
        document.body.appendChild(s);
        
        fetchAlbumWikiStory(title);
        fetchDiscogsCreditsFromServer(title, artist);
    };

    window.handleTracks = function(d) {
        currentAlbumTracks = d.data || [d];
        const list = document.getElementById('studio-track-list'); list.innerHTML = '';
        currentAlbumTracks.forEach((t, i) => {
            const div = document.createElement('div'); div.className = `p-4 hover:bg-zinc-800/50 cursor-pointer rounded-xl text-sm border-b border-zinc-900 ${!t.preview?'opacity-30':''}`;
            div.onclick = () => t.preview ? playSpecificTrack(i) : null;
            div.innerHTML = `<span class="text-zinc-600 font-mono mr-4">${i+1}</span> <span class="font-medium">${t.title}</span>`;
            list.appendChild(div);
        });
    };

    async function fetchDiscogsCreditsFromServer(title, artist) {
        const out = document.getElementById('discogs-credit-text'); out.innerHTML = "세션 검색 중...";
        try {
            const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(title)}&artistName=${encodeURIComponent(artist)}`);
            const d = await r.json(); currentDiscogsReleaseData = d;
            if (d.extraartists?.length) {
                let h = ""; d.extraartists.forEach(ar => h += createSessionElement(ar.role, ar.name));
                out.innerHTML = h;
            } else out.innerHTML = "정보 없음";
            if (currentAlbumTracks[currentTrackIndex]) updateTrackSpecificCredits(currentAlbumTracks[currentTrackIndex].title);
        } catch (e) { out.innerHTML = "연결 에러"; }
    }

    function updateTrackSpecificCredits(title) {
        const cont = document.getElementById('discogs-track-credits-container'), dataUi = document.getElementById('discogs-track-data-ui');
        if (!currentDiscogsReleaseData?.tracklist) return cont.classList.add('hidden');
        const track = currentDiscogsReleaseData.tracklist.find(tr => tr.title.toLowerCase().includes(title.toLowerCase()));
        if (track?.extraartists?.length) {
            document.getElementById('discogs-track-title').textContent = `🎵 ${track.title}`;
            let h = ""; track.extraartists.forEach(ar => h += createSessionElement(ar.role, ar.name));
            dataUi.innerHTML = h; cont.classList.remove('hidden');
        } else cont.classList.add('hidden');
    }

    async function fetchAlbumWikiStory(title) {
        try {
            const r = await fetch(`https://ko.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exsentences=5&explaintext=true&origin=*&titles=${encodeURIComponent(title)}`);
            const d = await r.json(); const id = Object.keys(d.query.pages)[0];
            document.getElementById('wiki-credit-text').innerHTML = d.query.pages[id].extract || "위키 정보가 없습니다.";
        } catch(e){}
    }

    // 6. 오디오 및 기타 UI
    const audio = document.getElementById('audio-element'), pI = document.getElementById('play-icon'), psI = document.getElementById('pause-icon');
    function playSpecificTrack(i) { currentTrackIndex = i; loadTrack(); }
    function loadTrack() {
        const t = currentAlbumTracks[currentTrackIndex]; if(!t?.preview) return;
        document.getElementById('global-player').classList.remove('translate-y-full');
        document.getElementById('player-title').textContent = t.title;
        document.getElementById('player-artist').textContent = t.artist.name;
        document.getElementById('player-cover').src = currentAlbumCover;
        audio.src = t.preview.replace(/^http:\/\//i, 'https://'); audio.play();
        pI.classList.add('hidden'); psI.classList.remove('hidden');
        updateTrackSpecificCredits(t.title);
    }
    function togglePlay() { if(audio.paused) audio.play(); else audio.pause(); pI.classList.toggle('hidden'); psI.classList.toggle('hidden'); }
    function playNextTrack() { currentTrackIndex = (currentTrackIndex+1)%currentAlbumTracks.length; loadTrack(); }
    function playPrevTrack() { currentTrackIndex = (currentTrackIndex-1+currentAlbumTracks.length)%currentAlbumTracks.length; loadTrack(); }
    function openStudioView() { document.getElementById('studio-view').classList.replace('studio-view-exit', 'studio-view-enter'); }
    function closeStudioView() { document.getElementById('studio-view').classList.replace('studio-view-enter', 'studio-view-exit'); }
    function closePlayerEntirely() { audio.pause(); document.getElementById('global-player').classList.add('translate-y-full'); closeStudioView(); }
    function handleLocalSearch() { renderAllSections(); }
    function applyAlbumSort() { albumSortOrder = document.getElementById('album-sort-select').value; renderAllSections(); }
    function showToast(m, t) {
        const c = document.getElementById('toast-container'); const toast = document.createElement('div');
        toast.className = `toast-animate bg-zinc-900 border ${t === 'success' ? 'border-pink-500' : 'border-zinc-500'} text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm flex items-center gap-2`;
        toast.innerHTML = `<span>🔍</span> <span>${m}</span>`;
        c.appendChild(toast); setTimeout(() => toast.remove(), 3000);
    }
    audio.addEventListener('timeupdate', () => { if (audio.duration) document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100; });
    document.getElementById('progress-bar').addEventListener('input', (e) => { if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration; });
</script>
</body>
</html>
