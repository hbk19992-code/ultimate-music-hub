        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUpFade { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -20px); opacity: 0; } }
        .toast-animate { animation: slideUpFade 4s ease-in-out forwards; }

        /* 👾 8-BIT RETRO THEME */
        @keyframes crt-flicker { 0% { opacity: 0.98; } 50% { opacity: 0.95; } 100% { opacity: 1; } }
        body.pixel-theme { font-family: 'Galmuri11', 'Galmuri9', sans-serif !important; background-color: #000 !important; animation: crt-flicker 0.15s infinite; cursor: url('https://cdn.custom-cursor.com/db/8222/32/pixel-cursor.png'), auto !important; }
        body.pixel-theme::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none; }
        body.pixel-theme::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%); z-index: 9998; pointer-events: none; }
        body.pixel-theme a, body.pixel-theme button, body.pixel-theme .cursor-pointer, body.pixel-theme select, body.pixel-theme input { cursor: url('https://cdn.custom-cursor.com/db/8221/32/pixel-pointer.png'), pointer !important; }
        body.pixel-theme * { border-radius: 0 !important; transition: none !important; }
        body.pixel-theme img { image-rendering: pixelated !important; border: 2px solid #333 !important; }
        body.pixel-theme .text-gradient { background: none !important; -webkit-text-fill-color: #10b981 !important; text-shadow: 3px 3px 0px #a238ff !important; }
        body.pixel-theme .bg-zinc-900, body.pixel-theme .bg-zinc-800 { background-color: #111 !important; border: 2px solid #10b981 !important; }
        body.pixel-theme .shadow-lg, body.pixel-theme .shadow-2xl, body.pixel-theme .group:hover { box-shadow: 4px 4px 0px rgba(16, 185, 129, 0.8) !important; transform: translate(-2px, -2px) !important; }
        body.pixel-theme input:not([type="range"]), body.pixel-theme select, body.pixel-theme button { border: 2px solid #444 !important; text-transform: uppercase; }
        body.pixel-theme input:focus:not([type="range"]), body.pixel-theme select:focus { border-color: #a238ff !important; }
        body.pixel-theme input[type="range"] { border: none !important; height: 6px !important; background: #333 !important; padding: 0 !important; }
        body.pixel-theme input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 16px; background: #10b981; border: 2px solid #fff; border-radius: 0; cursor: url('https://cdn.custom-cursor.com/db/8221/32/pixel-pointer.png'), pointer; }

<script>
    // Firebase Setup
    const firebaseConfig = { apiKey: "AIzaSyAhqMdOeEw8Z5lwuVebUkMeMsAzEWT2DDQ", authDomain: "owb-digging.firebaseapp.com", databaseURL: "https://owb-digging-default-rtdb.firebaseio.com", projectId: "owb-digging", storageBucket: "owb-digging.firebasestorage.app", messagingSenderId: "96150663418", appId: "1:96150663418:web:c17b3b61e18c670fa31943", measurementId: "G-NGH9PQSPRD" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    let currentUser = null, favorites = [];
    let currentArtist = null, currentArtistId = null, isFavoritesTab = false;
    let albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] };
    let fetchState = { albumsDone: false, featuresDone: false, itunesDone: false };
    let currentAlbumTracks = [], currentTrackIndex = 0, currentAlbumCover = "", currentDiscogsReleaseData = null;
    let playingQueue = [], playingIndex = 0, playingCover = "";
    let albumSortOrder = 'desc', currentFavFolder = '전체 보관함';
    let allFetchedFeatures = [], featureFetchCount = 0;

    // 🔥 V24.4: 딥서치 및 캐시 전역 변수
    window.discogsCache = window.discogsCache || {};
    let sessionSearchQuery = "";
    let isDeepSearching = false;

    // 🎵 Web Audio API
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function playRetroSound(type) {
        if (!document.body.classList.contains('pixel-theme')) return;
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'toggle') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'coin') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'click') { 
            osc.type = 'triangle'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    document.addEventListener('click', (e) => {
        if (document.body.classList.contains('pixel-theme')) {
            if (e.target.closest('button') || e.target.closest('.cursor-pointer') || e.target.closest('select') || e.target.closest('.group') || e.target.id === 'progress-bar') {
                if (e.target.closest('#pixel-toggle-btn')) return; playRetroSound('click');
            }
        }
    });

    window.togglePixelTheme = function() {
        document.body.classList.toggle('pixel-theme');
        const btn = document.getElementById('pixel-toggle-btn');
        playRetroSound('toggle'); 
        if (document.body.classList.contains('pixel-theme')) { btn.innerHTML = '🎨 HD MODE'; btn.classList.add('border-[#10b981]', 'text-[#10b981]'); btn.classList.remove('text-white'); showToast("8-BIT 모드 가동됨!", "success"); }

            allFetchedFeatures.forEach(t => { if(!seenAlbums.has(t.album.id)) { seenAlbums.add(t.album.id); uniqueFeatures.push(t); } });

    function tryRenderAll() {
        if (!fetchState.albumsDone || !fetchState.featuresDone || !fetchState.itunesDone) return; 
        document.getElementById('status-message').classList.add('hidden'); document.getElementById('results-controls').classList.remove('hidden'); 
        const seenTitles = new Set(); albumsData = { regular: [], ep: [], live: [], compilation: [], features: [] }; 
        const deezerTypeMap = new Map();
        window.allFetchedAlbums.forEach(a => { const tl = cleanTitleForSearch(a.title).toLowerCase(); if(!deezerTypeMap.has(tl)) deezerTypeMap.set(tl, a.record_type); });

        if (window.itunesAlbums) {
            window.itunesAlbums.forEach(a => {
                const tl = cleanTitleForSearch(a.collectionName).toLowerCase();
                if (!seenTitles.has(tl)) { 
                    seenTitles.add(tl);
                    const itunesAlbum = { id: a.collectionId, title: a.collectionName, cover_medium: a.artworkUrl100 ? a.artworkUrl100.replace('100x100bb', '600x600bb') : '', release_date: a.releaseDate, record_type: 'itunes', artist: { name: a.artistName }, source: 'itunes', trackCount: a.trackCount };
                    const artistNameLower = a.artistName.toLowerCase(); const searchArtistLower = currentArtist ? currentArtist.toLowerCase() : '';
                    if (searchArtistLower && !artistNameLower.includes(searchArtistLower) && !searchArtistLower.includes(artistNameLower)) { albumsData.features.push(itunesAlbum); }
                    else if (tl.includes('live')) albumsData.live.push(itunesAlbum);
                    else if (tl.includes('best of') || tl.includes('greatest hits') || tl.includes('anthology')) albumsData.compilation.push(itunesAlbum);
                    else {
                        const deezerType = deezerTypeMap.get(tl);
                        if (deezerType === 'ep' || deezerType === 'single') albumsData.ep.push(itunesAlbum);
                        else if (deezerType === 'album') albumsData.regular.push(itunesAlbum);
                        else {
                            if (tl.match(/\b(ep|single|album - ep|album - single)\b/) || a.trackCount <= 1) albumsData.ep.push(itunesAlbum);
                            else albumsData.regular.push(itunesAlbum);
                        }
                    }
                }
            });
        }
        window.allFetchedAlbums.forEach(a => { 
            const tl = cleanTitleForSearch(a.title).toLowerCase(); 
            if (!seenTitles.has(tl)) { 
                seenTitles.add(tl); a.source = 'deezer';
                if (a.record_type === 'compile' || tl.includes('best of')) albumsData.compilation.push(a); 
                else if (tl.includes('live')) albumsData.live.push(a); 
                else if (a.record_type === 'ep' || a.record_type === 'single') albumsData.ep.push(a); 
                else albumsData.regular.push(a); 
            }
        });
        if (window.deezerUniqueFeatures) {
            window.deezerUniqueFeatures.forEach(t => {
                const tl = cleanTitleForSearch(t.album.title).toLowerCase();
                if (!seenTitles.has(tl)) {
                    seenTitles.add(tl);
                    const featureAlbum = { id: t.album.id, title: t.album.title, cover_medium: t.album.cover_medium, release_date: t.album.release_date || '', record_type: 'deezer', artist: { name: t.artist.name }, source: 'deezer' };
                    albumsData.features.push(featureAlbum);
                }
            });
        }
        renderAllSections();
    }

    // 🔥 V24.4: 세션 딥서치 코어 엔진 함수
    window.startDeepSessionSearch = async function() {
        const q = document.getElementById('local-search-input').value.toLowerCase().trim();
        if (!q) return showToast("검색창에 찾고 싶은 세션 멤버의 이름을 입력하세요!", "error");
        if (isDeepSearching) return showToast("현재 세션 데이터를 초고속 분석 중입니다. 잠시만 기다려주세요.", "error");

        sessionSearchQuery = q;
        isDeepSearching = true;

        const targetAlbums = isFavoritesTab ? favorites : [...albumsData.regular, ...albumsData.ep, ...albumsData.compilation, ...albumsData.live, ...albumsData.features];
        
        // 중복 검색 방지를 위한 앨범 정리
        const uniqueAlbums = []; const seenIds = new Set();
        targetAlbums.forEach(a => { if (!seenIds.has(a.id)) { seenIds.add(a.id); uniqueAlbums.push(a); } });

        let matchCount = 0; let processed = 0;
        const statusMsg = document.getElementById('status-message');
        statusMsg.classList.remove('hidden'); statusMsg.textContent = `DEEP SEARCHING SESSIONS... (0 / ${uniqueAlbums.length})`;

        // 기존 매치 내역 초기화
        targetAlbums.forEach(a => a.sessionMatched = false);

        // Vercel 서버 보호를 위해 3개씩 묶어서(Batch) API 호출 (약간의 Delay 추가)
        for (let i = 0; i < uniqueAlbums.length; i += 3) {
            const batch = uniqueAlbums.slice(i, i + 3);

            await Promise.all(batch.map(async (album) => {
                const artistName = (album.artistNameCache || currentArtist) || album.artist?.name;
                const title = cleanTitleForSearch(album.title);
                const cacheKey = `${title}_${artistName}`;

                let creditsData = window.discogsCache[cacheKey];

                if (!creditsData) {
                    try {
                        const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(title)}&artistName=${encodeURIComponent(artistName)}`);
                        if (r.ok) { creditsData = await r.json(); window.discogsCache[cacheKey] = creditsData; }
                    } catch(e) { console.error(e); }
                }

                if (creditsData && creditsData.extraartists) {
                    const isMatch = creditsData.extraartists.some(ar => ar.name.toLowerCase().includes(q) || ar.role.toLowerCase().includes(q));
                    if (isMatch) {
                        targetAlbums.forEach(ta => { if (ta.id === album.id) ta.sessionMatched = true; });
                        matchCount++;
                    }
                }
                processed++;
            }));

            statusMsg.textContent = `DEEP SEARCHING SESSIONS... (${processed} / ${uniqueAlbums.length})`;
            // 서버 터짐 방지 0.2초 딜레이
            await new Promise(res => setTimeout(res, 200)); 
        }

        statusMsg.classList.add('hidden');
        showToast(`딥서치 완료! 해당 세션이 참여한 앨범 ${matchCount}장을 찾았습니다.`, "success");
        if (document.body.classList.contains('pixel-theme')) playRetroSound('coin');

        isDeepSearching = false;
        if(isFavoritesTab) renderFavorites(); else renderAllSections();
    };

    // V24.4: 개별 앨범 접속 시 기존에 구축된 캐시를 먼저 확인하여 로딩 속도 극대화
    async function fetchDiscogsCreditsFromServer(title, artist) { 
        const out = document.getElementById('discogs-credit-text'); 
        out.innerHTML = "<span class='animate-pulse text-zinc-500'>Vercel 서버와 통신 중... 🌐</span>"; 
        
        const cacheKey = `${cleanTitleForSearch(title)}_${artist}`;

        try { 
            let d = window.discogsCache[cacheKey];
            if (!d) {
                const r = await fetch(`/api/getDiscogs?albumTitle=${encodeURIComponent(title)}&artistName=${encodeURIComponent(artist)}`); 
                if (!r.ok) { const errorDetail = await r.text(); throw new Error(`HTTP ${r.status} | ${errorDetail}`); }
                d = await r.json(); 
                window.discogsCache[cacheKey] = d; 
            }
            
            currentDiscogsReleaseData = d; 
            
            if (d.extraartists?.length) { 
                let h = ""; d.extraartists.forEach(ar => h += createSessionElement(ar.role, ar.name)); out.innerHTML = h; 
            } else out.innerHTML = "<span class='text-zinc-500 font-bold'>세션 데이터가 없습니다.</span>";
            if (currentAlbumTracks && currentAlbumTracks.length > 0 && currentAlbumTracks[currentTrackIndex]) updateTrackSpecificCredits(currentAlbumTracks[currentTrackIndex].title); 
        } catch (e) { out.innerHTML = `<span class='text-rose-500 text-[10px]'>에러: ${e.message}</span>`; } 
    }

        }
    });
    window.handleItunesDeepLink = function(d) { if(d.results && d.results.length > 0) { const a = d.results[0]; const cover = a.artworkUrl100 ? a.artworkUrl100.replace('100x100bb', '600x600bb') : ''; playMedia('album', a.collectionId, cover, a.collectionName, a.artistName, false, 'itunes'); } };
    window.handleDeepLinkInit = function(d) { if(d && !d.error) { const cover = d.cover_medium || (d.album && d.album.cover_medium); playMedia(d.record_type ? 'album' : 'track', d.id, cover, d.title, d.artist?.name, false, 'deezer'); } };
    window.copyDeepLink = function() { navigator.clipboard.writeText(window.location.href).then(() => showToast("앨범 링크가 복사되었습니다! 🔗", "success")); };
    window.openInAppleMusic = function(albumId) { if (!albumId) return; const appUrl = `music://id/${albumId}`, webUrl = `https://music.apple.com/kr/album/${albumId}`; window.location.href = appUrl; setTimeout(() => { if (document.hasFocus()) window.open(webUrl, '_blank'); }, 500); };
    window.searchSessionMusician = function(name) { if (!name) return; closeStudioView(); const searchInput = document.getElementById('search-input'), searchMode = document.getElementById('search-mode'); if (searchInput && searchMode) { searchMode.value = 'artist'; searchInput.value = name; window.scrollTo({ top: 0, behavior: 'smooth' }); setTimeout(() => { initSearch(); }, 400); } };
    function createSessionElement(role, name) { const cleanName = name.replace(/\s\(\d+\)$/, ''); return `<div class="mb-3 flex items-start gap-3"><span class="role-badge shrink-0 mt-0.5">${role}</span><button class="session-trigger text-left text-white hover:text-[#10b981] font-black border-b-2 border-zinc-900 transition-all" data-name="${cleanName.replace(/"/g, '&quot;')}">${cleanName}</button></div>`; }
    document.getElementById('studio-view').addEventListener('click', function(e) { const trigger = e.target.closest('.session-trigger'); if (trigger) window.searchSessionMusician(trigger.getAttribute('data-name')); });
    function updateTrackSpecificCredits(title) { 
        const cont = document.getElementById('discogs-track-credits-container'), dataUi = document.getElementById('discogs-track-data-ui'); 
        if (!currentDiscogsReleaseData?.tracklist || !title) return cont.classList.add('hidden'); 
        const cleanTarget = cleanTitleForSearch(title).toLowerCase();
        const track = currentDiscogsReleaseData.tracklist.find(tr => { if (!tr.title) return false; const cleanSource = cleanTitleForSearch(tr.title).toLowerCase(); return cleanSource.includes(cleanTarget) || cleanTarget.includes(cleanSource); }); 
        if (track?.extraartists?.length) { document.getElementById('discogs-track-title').textContent = `TRACK: ${track.title}`; let h = ""; track.extraartists.forEach(ar => h += createSessionElement(ar.role, ar.name)); dataUi.innerHTML = h; cont.classList.remove('hidden'); } else cont.classList.add('hidden'); 
    }
    window.openStudioView = function() { document.getElementById('studio-view').classList.replace('studio-view-exit', 'studio-view-enter'); }
    window.closeStudioView = function() { document.getElementById('studio-view').classList.replace('studio-view-enter', 'studio-view-exit'); window.history.pushState({}, '', window.location.pathname); }
    window.playMedia = function(type, id, cover, title, artist, updateUrl = true, source = 'deezer') {
        if(updateUrl) { const url = new URL(window.location); url.searchParams.set('type', type); url.searchParams.set('id', id); url.searchParams.set('source', source); window.history.pushState({}, '', url); }
        currentAlbumCover = cover; currentDiscogsReleaseData = null; currentTrackIndex = 0; document.getElementById('studio-cover').src = cover; document.getElementById('studio-title').textContent = title; document.getElementById('studio-artist').textContent = artist; 
        const appleBtn = document.getElementById('open-apple-music-btn'); if (source === 'itunes') { appleBtn.classList.remove('hidden'); appleBtn.onclick = () => openInAppleMusic(id); } else appleBtn.classList.add('hidden');
        openStudioView(); const countryCode = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(artist) ? 'KR' : 'US';
        if (source === 'itunes') loadJSONP(`https://itunes.apple.com/lookup?id=${id}&entity=song&country=${countryCode}&callback=handleItunesTracks`); else loadJSONP(`https://api.deezer.com/${type}/${id}/${type==='album'?'tracks':''}?output=jsonp&callback=handleTracks`);
        const cleanTitle = cleanTitleForSearch(title); fetchAlbumWikiStory(cleanTitle, artist); fetchDiscogsCreditsFromServer(cleanTitle, artist);
    };
    window.handleItunesTracks = function(d) { if (!d.results) return; handleTracks({ data: d.results.filter(t => t.wrapperType === 'track').map(t => ({ id: t.trackId, title: t.trackName, preview: t.previewUrl, artist: { name: t.artistName } })) }); };
    window.handleTracks = function(d) { 
        currentAlbumTracks = d.data || [d]; const list = document.getElementById('studio-track-list'); list.innerHTML = ''; 
        currentAlbumTracks.forEach((t, i) => { const div = document.createElement('div'); div.className = `p-3 md:p-4 hover:bg-white/5 cursor-pointer rounded-xl flex items-center gap-4 ${!t.preview?'opacity-20':''}`; div.onclick = () => t.preview ? playSpecificTrack(i) : null; div.innerHTML = `<span class="text-zinc-600 font-mono w-6 text-center">${i+1}</span> <span class="font-bold flex-1 truncate">${t.title}</span>`; list.appendChild(div); }); 
        if (currentDiscogsReleaseData && currentAlbumTracks.length > 0) updateTrackSpecificCredits(currentAlbumTracks[currentTrackIndex].title);
    };
    function playSpecificTrack(i) { currentTrackIndex = i; playingQueue = [...currentAlbumTracks]; playingIndex = i; playingCover = currentAlbumCover; loadTrack(); }
    function loadTrack() { 
        const t = playingQueue[playingIndex]; if(!t?.preview) return; document.getElementById('global-player').classList.remove('translate-y-full'); document.getElementById('player-title').textContent = t.title; document.getElementById('player-artist').textContent = t.artist.name; document.getElementById('player-cover').src = playingCover; audio.src = t.preview.replace(/^http:\/\//i, 'https://'); audio.play(); document.getElementById('play-icon').classList.add('hidden'); document.getElementById('pause-icon').classList.remove('hidden'); 
        updateTrackSpecificCredits(t.title); fetchBpm(t.id); 
    }
    function fetchBpm(id) { window[`handleBpm_${id}`] = (d) => { const b = document.getElementById('aura-badge'), p = document.getElementById('global-player'); if(d.bpm) { b.textContent = `${d.bpm} BPM`; b.classList.remove('hidden'); p.className = `fixed bottom-0 left-0 right-0 bg-black/95 z-[120] transition-all duration-500 border-t border-zinc-900 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col ${d.bpm < 95 ? 'aura-chill' : d.bpm <= 125 ? 'aura-groove' : 'aura-hype'}`; } else b.classList.add('hidden'); }; loadJSONP(`https://api.deezer.com/track/${id}?output=jsonp&callback=handleBpm_${id}`); }
    async function fetchAlbumWikiStory(title, artist) {
        const wikiUI = document.getElementById('wiki-credit-text'); wikiUI.innerHTML = "<span class='animate-pulse text-zinc-500'>데이터베이스 검색 중... 🔍</span>";
        try {
            const wikiRes = await fetch(`https://ko.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exsentences=4&explaintext=true&origin=*&titles=${encodeURIComponent(title)}`); const wikiData = await wikiRes.json(); const pageId = Object.keys(wikiData.query.pages)[0]; const extract = wikiData.query.pages[pageId].extract;
            if (extract && extract.length > 20) { wikiUI.innerHTML = extract; return; }
            const LAST_FM_API_KEY = "bc6dfd44dfc503c39ec41ade07e02778"; const lastFmRes = await fetch(`https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LAST_FM_API_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(title)}&format=json`); const lastFmData = await lastFmRes.json();
            if (lastFmData.album?.wiki?.summary) { let cleanSummary = lastFmData.album.wiki.summary.replace(/<a href=.*<\/a>/, '').trim(); wikiUI.innerHTML = `<span class="text-[#10b981] font-bold text-[10px] bg-[#10b981]/20 px-2 py-1 rounded mb-2 inline-block">Last.fm Trivia</span><br>${cleanSummary}`; } else wikiUI.innerHTML = "트리비아가 없습니다 💿";
        } catch(e) { wikiUI.innerHTML = "로드 실패"; }
    }
    const audio = document.getElementById('audio-element'), pI = document.getElementById('play-icon'), psI = document.getElementById('pause-icon');
    function togglePlay() { if(audio.paused) { audio.play(); pI.classList.add('hidden'); psI.classList.remove('hidden'); } else { audio.pause(); pI.classList.remove('hidden'); psI.classList.add('hidden'); } }
    function playNextTrack() { playingIndex = (playingIndex+1)%playingQueue.length; loadTrack(); }
    function playPrevTrack() { playingIndex = (playingIndex-1+playingQueue.length)%playingQueue.length; loadTrack(); }
    function closePlayerEntirely() { audio.pause(); document.getElementById('global-player').classList.add('translate-y-full'); closeStudioView(); }
    function applyAlbumSort() { albumSortOrder = document.getElementById('album-sort-select').value; renderAllSections(); }
    function switchTab(t) { 
        isFavoritesTab = (t === 'fav'); const ts = document.getElementById('tab-search'), tf = document.getElementById('tab-fav');
        ts.className = isFavoritesTab ? "flex-1 py-3 text-xs md:text-sm font-bold text-zinc-500" : "flex-1 py-3 text-xs md:text-sm font-bold bg-zinc-800 text-white rounded-lg shadow-lg"; tf.className = isFavoritesTab ? "flex-1 py-3 text-xs md:text-sm font-bold bg-zinc-800 text-white rounded-lg shadow-lg" : "flex-1 py-3 text-xs md:text-sm font-bold text-zinc-500"; renderAllSections(); 
    }
    function showToast(m, t) { 
        const c = document.getElementById('toast-container'); const toast = document.createElement('div'); 
        toast.className = `toast-animate bg-zinc-900 border ${t === 'success' ? 'border-[#10b981]' : 'border-zinc-500'} text-white px-6 py-3 rounded-full shadow-2xl font-bold text-xs md:text-sm flex items-center gap-2 mb-2`; 
        if (document.body.classList.contains('pixel-theme')) {
            toast.innerHTML = `<span>${t==='success'?'▶':'▷'}</span> <span class="typing-text"></span>`; c.appendChild(toast); 
            if (t === 'success') playRetroSound('coin');
            const textSpan = toast.querySelector('.typing-text'); let i = 0; const typing = setInterval(() => { textSpan.textContent += m.charAt(i); i++; if (i >= m.length) clearInterval(typing); }, 50); 
        } else { toast.innerHTML = `<span>${t==='success'?'✅':'✨'}</span> <span>${m}</span>`; c.appendChild(toast); }
        setTimeout(() => toast.remove(), 4000); 
    }
    audio.addEventListener('timeupdate', () => { if (audio.duration) document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100; });
    document.getElementById('progress-bar').addEventListener('input', (e) => { if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration; });
    document.getElementById('search-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') initSearch(); });
</script>
